<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>낱말바둑</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; font-family: 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif; }
  body { background: #f5f1e8; }
  #board { display: block; cursor: grab; touch-action: none; }
  #board.dragging { cursor: grabbing; }

  #brand {
    position: fixed; top: 12px; left: 12px; z-index: 11;
    background: rgba(255,255,255,.95); border: 1px solid #d8d2c4;
    border-radius: 20px; padding: 8px 14px; box-shadow: 0 2px 8px rgba(0,0,0,.08);
    font-size: 15px; font-weight: 700; color: #1a1a1a; cursor: pointer;
    user-select: none; -webkit-user-select: none; -webkit-tap-highlight-color: transparent;
  }
  /* 배포할 때마다 이 버전 번호를 올림(예: v1.0.0 -> v1.0.1) — 지금 보고 있는 화면이
     최신 배포와 같은 버전인지 한눈에 확인할 수 있게 타이틀 옆에 작게 표시 */
  #verTag { font-size: 10px; font-weight: 400; color: #a89a78; vertical-align: middle; }
  #infoPanel {
    /* 최상단 레이어 — wordInput/modeBadge/toast 등 다른 모든 UI(z-index 30 이하)보다
       위에 오도록 해서, 선택된 칸의 배지 등과 겹쳐 보이지 않게 함 */
    position: fixed; top: 54px; left: 12px; z-index: 40;
    background: rgba(255,255,255,.95); border: 1px solid #d8d2c4;
    border-radius: 12px; padding: 12px 15px; box-shadow: 0 2px 10px rgba(0,0,0,.1);
    font-size: 13px; color: #444; line-height: 1.7; max-width: 280px;
    /* 창 높이를 줄였을 때 패널이 화면 아래로 잘려 나가지 않도록, 남는 높이만큼만
       차지하고 넘치는 내용은 패널 안에서 스크롤되게 함 */
    max-height: calc(100vh - 70px); overflow-y: auto;
  }
  #infoPanel b { color: #1a1a1a; font-size: 15px; }
  #infoPanel.hidden { display: none; }
  /* 반복 테스트를 위한 임시 초기화 버튼 — 테스트 끝나면 이 스타일/버튼 통째로 지워도 됨 */
  #resetBoardBtn {
    display: block; margin: 10px 0 2px; padding: 5px 10px; font-size: 11px;
    border: 1px solid #e2a8a8; border-radius: 8px; background: #fbeaea; color: #b23c3c;
    cursor: pointer;
  }
  #resetBoardBtn:hover { background: #f6d6d6; }
  #credit { margin-top: 8px; font-size: 12px; }
  #credit a { color: #a08c5a; text-decoration: none; }
  #credit a:hover { text-decoration: underline; }
  #topRight { position: fixed; top: 12px; right: 12px; z-index: 10; display: flex; gap: 6px; }
  #userCountTag { font-size: 12px; padding: 6px 10px; border-radius: 20px;
    background: #e5e0d3; color: #777; white-space: nowrap; }
  #userCountTag.on { background: #dcefdb; color: #2c6e2f; }

  #leaderboard {
    position: fixed; top: 46px; right: 12px; z-index: 10;
    background: rgba(255,255,255,.95); border: 1px solid #d8d2c4;
    border-radius: 12px; padding: 10px 14px; box-shadow: 0 2px 10px rgba(0,0,0,.1);
    font-size: 12px; color: #444; min-width: 150px; max-width: 220px;
    /* 접속자 전원을 표시하면서 인원이 많아지거나 창 높이가 줄어들면 화면 밖으로 잘릴 수
       있으므로, 남는 높이만큼만 차지하고 넘치면 패널 안에서 스크롤되게 함 */
    max-height: calc(100vh - 60px); overflow-y: auto;
  }
  #leaderboard.hidden { display: none; }
  #leaderboard ol { list-style: none; counter-reset: lb; }
  #leaderboard li { counter-increment: lb; display: flex; align-items: center; gap: 6px;
    padding: 2px 0; }
  #leaderboard li::before { content: counter(lb) "등"; width: 26px; color: #9a927d; font-size: 11px; }
  #leaderboard .dot { width: 8px; height: 8px; border-radius: 50%; flex: none; }
  #leaderboard .name { flex: 1; min-width: 0; overflow-wrap: break-word; }
  #leaderboard li.me .name { font-weight: 700; }
  #leaderboard .cnt { color: #6b5e3f; font-variant-numeric: tabular-nums;
    font-size: 14px; font-weight: 800; margin-left: 2px; display: inline-block; }
  #leaderboard .cnt.bump { animation: scoreBump .6s ease; }
  @keyframes scoreBump {
    0% { transform: scale(1); color: #6b5e3f; }
    35% { transform: scale(1.4); color: #2c8f4a; }
    100% { transform: scale(1); color: #6b5e3f; }
  }
  /* 오른쪽 끝의 LIVE 태그 — 지금 실제로 접속 중인 플레이어만 불이 들어오고(초록),
     예전에 땅은 땄지만 지금은 접속 안 한 플레이어는 꺼진 채(회색)로 표시됨 */
  #leaderboard .live { flex: none; margin-left: 4px; font-size: 9px; font-weight: 700;
    letter-spacing: .02em; padding: 2px 5px; border-radius: 8px;
    background: #eee9dd; color: #b8ae97; }
  #leaderboard .live.on { background: #dcefdb; color: #2c6e2f; }

  /* 칸에 직접 입력: 보이는 입력창/버튼 없음. wordInput은 IME(한글 조합) 지원을 위해
     실제로 존재하지만 화면엔 보이지 않고, 타이핑한 글자는 캔버스 칸에 바로 그려짐. */
  /* opacity:0 대신 element 자체는 opacity:1(=완전히 "보이는" 요소)로 두고
     글자색/배경/캐럿만 투명하게 해서, 일부 브라우저가 "투명 요소엔 IME(한글 조합)를
     안 띄우는" 문제를 피한다. 실제로는 화면에 아무것도 안 보임. */
  #wordInput {
    position: fixed; z-index: 20; opacity: 1; border: none; padding: 0; margin: 0;
    font-size: 16px; color: transparent; background: transparent; caret-color: transparent;
    /* pointer-events:none을 쓰지 않음 — iOS 등 일부 모바일 브라우저는 pointer-events:none인
       input은 JS로 focus()해도 소프트웨어 키보드를 안 띄우는 경우가 있음. wordInput은 항상
       "지금 선택된 칸" 위에만 걸쳐 있어서, 그 칸을 다시 탭했을 때 네이티브로 재포커스되는 것도
       문제 없음(이미 그 칸이 선택된 상태이므로). */
    min-width: 24px; min-height: 24px; outline: none; box-shadow: none;
  }
  /* 방향 전환 배지 — 선택 칸 위에 띄움. 터치하기 편하도록 넉넉한 크기로 만들고,
     그리드 칸과 안 겹치게 충분히 띄움. 제출은 키보드 Enter로만 함(별도 버튼 없음).
     아래쪽에 살짝 진한 테두리(버튼의 "옆면"처럼)를 줘서 눌러볼 수 있는 버튼처럼 보이게 하고,
     hover/active 시 눌리는 느낌을 줌(터치 기기에선 hover가 안 먹으니 자연히 무시됨). */
  #modeBadge {
    position: fixed; z-index: 21; display: none;
    padding: 8px 14px; border-radius: 12px; font-size: 14px; font-weight: 700;
    background: #f3ecdd; color: #6b5e3f; border: 1.5px solid #cfc7b5;
    border-bottom: 3px solid #b8ac8f;
    white-space: nowrap; transform: translate(-50%, -155%);
    box-shadow: 0 2px 6px rgba(0,0,0,.16);
    cursor: pointer; user-select: none; -webkit-user-select: none; -webkit-tap-highlight-color: transparent;
    align-items: center; justify-content: center;
    transition: background .1s, transform .1s, box-shadow .1s;
  }
  #modeBadge.show { display: flex; }
  #modeBadge:hover { background: #ece2cc; }
  #modeBadge:active { transform: translate(-50%, -150%); border-bottom-width: 1.5px; box-shadow: 0 1px 3px rgba(0,0,0,.16); }
  #modeBadge.ok { background: #dcefdb; color: #2c6e2f; border-color: #8fcf93; border-bottom-color: #6bb571; }
  #modeBadge.err { background: #f7dcdc; color: #a23c3c; border-color: #e29a9a; border-bottom-color: #d97a7a; }
  /* 웹(비터치 기기)에서만 "Tab으로도 전환 가능"을 직관적으로 보여주는 작은 힌트 */
  #modeBadge .tabHint {
    margin-left: 7px; padding: 1px 5px; border-radius: 5px; font-size: 10px; font-weight: 700;
    background: rgba(0,0,0,.13); letter-spacing: .02em;
  }

  #toast {
    position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
    background: rgba(40,40,40,.92); color: #fff; padding: 9px 18px;
    border-radius: 20px; font-size: 13px; z-index: 30; display: none;
    max-width: 90vw; text-align: center;
  }

  @media (max-width: 640px) {
    /* 주소창/노치 등 모바일 상단 UI에 가려 잘리지 않도록 더 아래로, safe-area까지 고려 */
    #toast { bottom: auto; top: calc(92px + env(safe-area-inset-top, 0px)); }
    #leaderboard { font-size: 11px; padding: 8px 10px; min-width: 120px; max-width: 160px; }
  }
</style>
</head>
<body>
<canvas id="board"></canvas>

<div id="brand">낱말바둑? <span id="verTag">v1.1.6</span></div>
<div id="infoPanel" class="hidden">
  <b>낱말바둑</b>
  <div>실시간으로 함께 두는 낱말바둑.<br>
  낱말로 에워싼 영역은 내 땅이 됩니다.<br>
  칸을 클릭해 낱말을 이어가 보세요.<br>
  <span style="color:#8a7a4f">방향키로 칸 이동, Tab으로 가로/세로 전환</span></div>
  <button id="resetBoardBtn" type="button">전체 낱말 초기화 (테스트용)</button>
  <div id="credit"><a href="https://instagram.com/wooramsol" target="_blank" rel="noopener">Created by @wooramsol</a></div>
</div>
<div id="topRight">
  <div id="userCountTag">현재접속자 1명</div>
</div>
<div id="leaderboard" class="hidden">
  <ol id="lbList"></ol>
</div>

<!-- 칸에 직접 입력: 보이는 입력창 없음. wordInput은 한글 IME 조합을 위해 필요하지만
     화면엔 안 보이고 선택된 칸 위치로 계속 따라다님. modeBadge는 가로/세로 모드 + 입력 상태만 표시 -->
<input id="wordInput" autocomplete="off" autocapitalize="off" autocorrect="off" spellcheck="false" inputmode="text" lang="ko">
<div id="modeBadge"></div>

<div id="toast"></div>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
<script src="firebase-config.js"></script>
<script>
'use strict';
// ---------- 상태 ----------
const cells = new Map();            // "x,y" -> { ch, dirs:[], fresh }
const K = (x, y) => x + ',' + y;

// ---------- 보드 크기 제한(30x30, 무한 아님) ----------
// 원점(0,0)이 대략 화면 중앙에 오도록 살짝 좌상단으로 치우치게 잡음(30은 짝수라 정확히
// 가운데인 칸은 없음). 이 범위 밖은 항상 "벽"(포획된 칸과 동일 취급)으로 처리해서 글자를
// 놓을 수도, 그 너머로 단어를 이어붙일 수도 없게 막음
const BOARD_MIN = -15, BOARD_MAX = 14; // 30칸: -15 ~ 14
const inBounds = (x, y) => x >= BOARD_MIN && x <= BOARD_MAX && y >= BOARD_MIN && y <= BOARD_MAX;
const OUT_OF_BOUNDS_WALL = { ch: null, dirs: [], captured: true, owner: null };
const PAN_MARGIN = 3; // 보드 경계 밖으로 카메라를 옮길 수 있는 여유 칸 수(끝없이 스크롤되는 것 방지)
let usedWords = new Set();          // 이미 보드에 쓰인 단어(canonical 기준) — 중복 사용 방지
let userCount = 1;
let onlineIds = new Set();          // 지금 접속 중인 플레이어 clientId 목록(나 포함) — 점수표 표시용
let DICT = null;                    // 사전 (Hosting에서 로드)
let clientId = null;                // /api/identify(IP 기반 익명 ID) 로 비동기 확정됨 — boot() 참고
let boardRef = null;                // Firebase 준비되면 boot()에서 할당
let myPresenceRef = null;           // 내 프레즌스 노드(선택 칸/입력 중인 글자 브로드캐스트용)
const livePeers = new Map();        // clientId -> { x, y, dir, typed, ts } — 다른 유저의 실시간 입력 상황

// IP 기반 익명 ID 발급 (서버: functions/index.js). 함수 호출 실패 시(로컬 개발 등)엔
// 기존 방식(브라우저별 임의 ID)으로 폴백해서 앱이 계속 동작하게 함.
async function fetchClientId() {
  try {
    const res = await fetch('/api/identify');
    const data = await res.json();
    if (data && data.id) return data.id;
  } catch (e) { /* 폴백으로 진행 */ }
  try {
    let id = localStorage.getItem('wv-id');
    if (!id) { id = '유저' + Math.random().toString(36).slice(2, 6); localStorage.setItem('wv-id', id); }
    return id;
  } catch { return '유저' + Math.random().toString(36).slice(2, 6); }
}

let camX = -6, camY = -5, cellSize = 48;

let sel = null;                     // { x, y, dir }
let preview = null;                 // { startX, startY, word, conflictTyped }
let placing = false;
let placedWordsIndex = new Map();   // canonical 단어 -> { x, y, dir, word } — 중복 단어 위치 하이라이트용
let dupHighlight = null;            // 지금 입력이 중복 단어일 때, 이미 보드에 있는 그 단어들의 위치

// ---------- 두음법칙 ----------
const Y_VOWELS = new Set([2, 6, 7, 12, 17, 20]); // ㅑ ㅕ ㅖ ㅛ ㅠ ㅣ
function dueumVariants(ch) {
  const code = ch.charCodeAt(0) - 0xac00;
  if (code < 0 || code > 11171) return [];
  const ini = Math.floor(code / 588);
  const rest = code % 588;
  const vow = Math.floor(rest / 28);
  const make = i => String.fromCharCode(0xac00 + i * 588 + rest);
  if (ini === 5) return [Y_VOWELS.has(vow) ? make(11) : make(2)]; // ㄹ → ㅇ/ㄴ
  if (ini === 2 && Y_VOWELS.has(vow)) return [make(11)];          // ㄴ → ㅇ
  return [];
}

function dictLookup(word, firstExisting) {
  if (DICT.has(word)) return word;
  if (firstExisting) {
    for (const v of dueumVariants(word[0])) {
      const cand = v + word.slice(1);
      if (DICT.has(cand)) return cand;
    }
  }
  return null;
}

// ---------- 배치 판독 (병합/분리 + 두음법칙 + 사전) ----------
// getCell(x,y) -> { ch, dirs:[], captured, owner } | null 을 받아 어떤 상태에서든 검증 가능
// (미리보기: 로컬 Map, 트랜잭션: DB 스냅샷). captured 칸은 글자가 없는 "포획된 영역" — 벽 취급, 절대 사용 불가
function resolvePlace(typed, x, y, dir, getCell, boardEmpty, usedWords) {
  const dx = dir === 'h' ? 1 : 0, dy = dir === 'v' ? 1 : 0;

  let prefix = '', sx = x, sy = y;
  while (true) {
    const ex = getCell(sx - dx, sy - dy);
    if (!ex || ex.captured) break;
    prefix = ex.ch + prefix;
    sx -= dx; sy -= dy;
  }
  let suffix = '', ei = typed.length;
  while (true) {
    const ex2 = getCell(x + dx * ei, y + dy * ei);
    if (!ex2 || ex2.captured) break;
    suffix += ex2.ch; ei++;
  }

  const tCells = [];
  let overlap = 0, newCount = 0;
  for (let i = 0; i < typed.length; i++) {
    const ex = getCell(x + dx * i, y + dy * i);
    tCells.push(ex);
    if (ex) overlap++; else newCount++;
  }
  if (tCells.some(c => c && c.captured)) {
    return { err: '포획된 영역이라 사용할 수 없습니다.' };
  }
  if (newCount === 0) return { err: '이미 모두 채워진 자리입니다.' };
  if (!boardEmpty && overlap === 0 && !prefix && !suffix) {
    return { err: '기존 단어와 최소 한 글자는 이어져야 합니다.' };
  }

  // 접두/접미를 "전부 쓰거나 아예 안 쓰거나"만 시도하면, 예를 들어 기존 3글자 단어
  // "길동무"에 이어 "선"을 쳤을 때 "길동무선"(접두 3글자 전부)과 "선"(0글자)만 검사하고,
  // 그 사이의 "무선"(접두 1글자만)은 절대 못 찾음. 그래서 접두 0~전체, 접미 0~전체 길이를
  // 전부 조합해서 시도하고, 그중 가장 긴(더 완전한) 조합부터 사전에 있는지 확인함.
  const combos = [];
  for (let pLen = prefix.length; pLen >= 0; pLen--) {
    for (let sLen = suffix.length; sLen >= 0; sLen--) {
      combos.push({ pLen, sLen, len: pLen + typed.length + sLen });
    }
  }
  combos.sort((a, b) => b.len - a.len);

  const fails = [];
  for (const { pLen, sLen } of combos) {
    let gridTyped = '', conflict = null;
    for (let i = 0; i < typed.length; i++) {
      const ex = tCells[i];
      if (ex) {
        // 두음법칙은 이 글자가 "완성 단어의 첫 글자"일 때만 적용 — 접두를 하나라도 쓰면
        // 그 앞에 글자가 더 있으므로 여기는 단어 첫 글자가 아님
        const dueumOk = i === 0 && pLen === 0 && dueumVariants(ex.ch).includes(typed[i]);
        if (ex.ch !== typed[i] && !dueumOk) {
          conflict = { kind: 'conflict', i, msg: `${i + 1}번째 칸의 기존 글자('${ex.ch}')와 다릅니다.` };
          break;
        }
        gridTyped += ex.ch;
      } else gridTyped += typed[i];
    }
    if (conflict) { fails.push(conflict); continue; }

    const usedPrefix = pLen > 0 ? prefix.slice(prefix.length - pLen) : '';
    const usedSuffix = sLen > 0 ? suffix.slice(0, sLen) : '';
    const word = usedPrefix + gridTyped + usedSuffix;
    if (word.length < 2) { fails.push({ kind: 'short' }); continue; }
    if (word.length > 15) { fails.push({ kind: 'long', msg: '완성 단어가 15글자를 넘습니다.' }); continue; }

    const startX = x - dx * pLen;
    const startY = y - dy * pLen;

    if (!DICT) return { err: '사전을 아직 불러오는 중이에요…' };
    const firstExisting = !!getCell(startX, startY);
    const canonical = dictLookup(word, firstExisting);
    if (!canonical) { fails.push({ kind: 'dict', word }); continue; }
    if (usedWords && usedWords.has(canonical)) { fails.push({ kind: 'dup', word: canonical }); continue; }

    return { ok: true, word, canonical, startX, startY };
  }

  // 중복(dup) 메시지를 사전(dict) 메시지보다 먼저 확인해야 함: 부분 접두/접미 조합을
  // 여러 개 시도하다 보면, 정작 사용자가 의도한 "가장 완전한" 조합은 이미 쓰인 단어(dup)라
  // 실패했는데, 그보다 짧은 다른 조합이 그냥 사전에 없어서(dict) 실패한 경우도 흔함. 이때
  // dict 메시지를 먼저 보여주면 "그냥 사전에 없다"는 것처럼 보여서 정작 중복이라는 진짜
  // 이유를 사용자가 알 수 없고, 중복 하이라이트(dupWords)도 안 뜨게 되어 "중복 처리가 아예
  // 작동을 안 하는 것" 처럼 보이는 버그가 있었음.
  const dupWords = [...new Set(fails.filter(f => f.kind === 'dup').map(f => f.word))];
  if (dupWords.length) {
    return {
      err: dupWords.map(w => `'${w}'`).join(', ') + '(은)는 이미 보드에서 쓰인 단어예요. 한 단어는 한 번만 쓸 수 있어요.',
      dupWords, // 어디에 이미 쓰였는지 화면에 하이라이트하기 위해 canonical 단어 목록을 같이 넘김
    };
  }
  const dictWords = [...new Set(fails.filter(f => f.kind === 'dict').map(f => f.word))];
  if (dictWords.length) {
    // 접두/접미를 여러 길이로 시도하다 보니 실패한 후보 단어가 아주 많아질 수 있어서
    // (예: "...지역삼뻭", "비자본주의...지역삼뻭" 등 10개 넘게) 전부 나열하면 메시지가
    // 감당 안 되게 길어짐. 그래서 어떤 조합으로 읽었는지는 생략하고 통일된 문구만 보여줌
    return { err: '사전에 없는 단어입니다.' };
  }
  const conf = fails.find(f => f.kind === 'conflict');
  if (conf) return { err: conf.msg, conflictTyped: conf.i, word: prefix + typed + suffix, startX: sx, startY: sy };
  const long = fails.find(f => f.kind === 'long');
  if (long) return { err: long.msg };
  return { err: '두 글자 이상 입력하세요.', tooShort: true }; // 에러가 아니라 '아직 입력 중'일 뿐이므로 배지를 빨간색으로 만들지 않음
}

// ---------- 땅따먹기: 완전히 둘러싸인 빈 칸 포획(flood-fill) ----------
// getCell(x,y): 벽(글자, 이미 포획된 칸, 30x30 경계 밖)이면 truthy, 진짜 빈 칸이면 null
// newlyPlacedCoords: 이번에 새로 놓인 글자 칸 좌표들 — 이 칸들의 인접 빈 칸에서만 탐색 시작
// 보드 경계도 벽으로 치기 때문에(가장자리에 붙어 나머지 삼면만 글자로 막아도 포획 인정),
// "가운데에 글자 하나만 놓아도 남은 보드 전체가 포획되는" 것을 막을 안전장치가 필요함.
// 영역의 가로/세로 "폭"(bounding box)이 MAX_SPAN을 넘으면 "포획 아님"으로 처리 —
// 30x30 보드 기준으로 절반 정도(15칸)까지는 허용하고, 그보다 넓게 뻗어나가면(=사실상
// 거의 보드 전체를 둘러싼 셈이라 우연/실수일 가능성이 높음) 포획하지 않음
function findCapturedRegions(getCell, K, newlyPlacedCoords) {
  const MAX_SPAN = 15; // 영역의 가로 또는 세로 폭이 이 칸 수를 넘으면 "포획 아님"
  const globalVisited = new Set();
  const captured = [];
  const NEI = (cx, cy) => [[cx + 1, cy], [cx - 1, cy], [cx, cy + 1], [cx, cy - 1]];

  for (const [sx0, sy0] of newlyPlacedCoords) {
    for (const [nx, ny] of NEI(sx0, sy0)) {
      const seedKey = K(nx, ny);
      if (globalVisited.has(seedKey) || getCell(nx, ny)) continue;

      const localVisited = new Set([seedKey]);
      const queue = [[nx, ny]];
      const region = [[nx, ny]];
      let minX = nx, maxX = nx, minY = ny, maxY = ny;
      let leaked = false;
      while (queue.length && !leaked) {
        const [cx, cy] = queue.shift();
        for (const [ax, ay] of NEI(cx, cy)) {
          const ak = K(ax, ay);
          if (localVisited.has(ak) || getCell(ax, ay)) continue;
          localVisited.add(ak);
          const nMinX = Math.min(minX, ax), nMaxX = Math.max(maxX, ax);
          const nMinY = Math.min(minY, ay), nMaxY = Math.max(maxY, ay);
          if (nMaxX - nMinX + 1 > MAX_SPAN || nMaxY - nMinY + 1 > MAX_SPAN) { leaked = true; break; }
          minX = nMinX; maxX = nMaxX; minY = nMinY; maxY = nMaxY;
          region.push([ax, ay]);
          queue.push([ax, ay]);
        }
      }
      for (const k of localVisited) globalVisited.add(k);
      if (!leaked) captured.push(...region);
    }
  }
  return captured;
}

// ---------- 캔버스 ----------
const canvas = document.getElementById('board');
const ctx = canvas.getContext('2d');
const dpr = window.devicePixelRatio || 1;

function resize() {
  canvas.width = innerWidth * dpr;
  canvas.height = innerHeight * dpr;
  canvas.style.width = innerWidth + 'px';
  canvas.style.height = innerHeight + 'px';
  draw();
}
addEventListener('resize', resize);

function worldToScreen(wx, wy) { return [(wx - camX) * cellSize, (wy - camY) * cellSize]; }
function screenToCell(sx, sy) { return [Math.floor(sx / cellSize + camX), Math.floor(sy / cellSize + camY)]; }
// clientX/clientY(뷰포트 기준)를 캔버스 기준 좌표로 변환. 캔버스가 항상 (0,0)에 딱 붙어있다는
// 가정 대신 실제 위치(getBoundingClientRect)를 매번 확인해서, 모바일에서 주소창 접힘/노치 등으로
// 생기는 미세한 오프셋 때문에 탭한 칸과 실제 선택되는 칸이 어긋나는 문제를 방지함.
function toCanvasXY(clientX, clientY) {
  const rect = canvas.getBoundingClientRect();
  return [clientX - rect.left, clientY - rect.top];
}

function roundRect(x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.arcTo(x + w, y, x + w, y + h, r);
  ctx.arcTo(x + w, y + h, x, y + h, r);
  ctx.arcTo(x, y + h, x, y, r);
  ctx.arcTo(x, y, x + w, y, r);
  ctx.closePath();
}

function cellBox(sx, sy, fill, stroke, lw) {
  ctx.fillStyle = fill;
  roundRect(sx + 1.5, sy + 1.5, cellSize - 3, cellSize - 3, 5);
  ctx.fill();
  ctx.strokeStyle = stroke; ctx.lineWidth = lw;
  roundRect(sx + 1.5, sy + 1.5, cellSize - 3, cellSize - 3, 5);
  ctx.stroke();
}

// 유저 ID -> 과일 이름 + 그 과일다운 고정 색상(hue) 매핑. 익명 ID 문자열 대신
// 알아보기 쉬운 과일 이름으로 표시하고, 포획 영역/리더보드/실시간 하이라이트 색상도 여기서 통일.
// 색상이 서로 비슷해 헷갈리는 과일은 빼고, 색상환에서 최대한 고르게 떨어진 것만 남김
const FRUITS = [
  { name: '사과', hue: 355 }, { name: '오렌지', hue: 28 }, { name: '바나나', hue: 55 },
  { name: '키위', hue: 95 }, { name: '수박', hue: 160 }, { name: '블루베리', hue: 225 },
  { name: '포도', hue: 275 }, { name: '자두', hue: 310 },
];
function hashStr(str) {
  let h = 0;
  const s = str || '';
  for (let i = 0; i < s.length; i++) h = (h * 31 + s.charCodeAt(i)) >>> 0;
  return h;
}
function fruitOf(owner) {
  return FRUITS[hashStr(owner) % FRUITS.length];
}
function ownerHue(owner) { return fruitOf(owner).hue; }
function ownerName(owner) { return fruitOf(owner).name; }
// 내(현재 접속자) 색상 — clientId 확정 전(로딩 중)에는 기본 파랑 계열 사용
function myHue() {
  return clientId ? ownerHue(clientId) : 210;
}

// 가로/세로 1회 제한 규칙 삭제: 어떤 칸이든 항상 이어서 쓸 수 있음
function isBlocked(x, y) {
  return false;
}

function dirAvailable(x, y, dir) {
  return true;
}

// 카메라(camX/camY)가 30x30 보드 밖으로 끝없이 스크롤되지 않도록 여유(PAN_MARGIN)를 두고
// 제한함 — 경계선이 잘 보일 정도의 여백은 남기되, 그 너머 빈 공간으로 무한히 나가지는 못하게
function clampCamera() {
  const vw = innerWidth, vh = innerHeight;
  const minX = BOARD_MIN - PAN_MARGIN, maxWorldX = BOARD_MAX + 1 + PAN_MARGIN;
  const minY = BOARD_MIN - PAN_MARGIN, maxWorldY = BOARD_MAX + 1 + PAN_MARGIN;
  const spanX = maxWorldX - minX, spanY = maxWorldY - minY;
  const viewSpanX = vw / cellSize, viewSpanY = vh / cellSize;
  // 최대로 줌아웃해서 화면이 (보드+여유)보다 넓어지면, 예전엔 그냥 왼쪽/위쪽 끝(minX/minY)에
  // 고정돼서 화면 한쪽으로 쏠려 보였음. 이럴 땐 고정하는 대신 남는 공간을 좌우/상하로
  // 똑같이 나눠서 보드가 화면 정중앙에 오도록 함
  camX = viewSpanX >= spanX
    ? minX - (viewSpanX - spanX) / 2
    : Math.min(Math.max(camX, minX), maxWorldX - viewSpanX);
  camY = viewSpanY >= spanY
    ? minY - (viewSpanY - spanY) / 2
    : Math.min(Math.max(camY, minY), maxWorldY - viewSpanY);
}

function draw() {
  clampCamera();
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  ctx.clearRect(0, 0, innerWidth, innerHeight);

  const x0 = Math.floor(camX), y0 = Math.floor(camY);
  const x1 = Math.ceil(camX + innerWidth / cellSize), y1 = Math.ceil(camY + innerHeight / cellSize);

  // 보드 범위(30x30) 바깥은 살짝 어둡게 칠해서 여기까지가 한계라는 걸 시각적으로 보여줌
  const [boardSx0, boardSy0] = worldToScreen(BOARD_MIN, BOARD_MIN);
  const [boardSx1, boardSy1] = worldToScreen(BOARD_MAX + 1, BOARD_MAX + 1);
  ctx.fillStyle = 'rgba(60,50,30,.055)';
  ctx.fillRect(0, 0, innerWidth, innerHeight);
  ctx.clearRect(boardSx0, boardSy0, boardSx1 - boardSx0, boardSy1 - boardSy0);
  ctx.strokeStyle = '#c3b490'; ctx.lineWidth = 2;
  ctx.strokeRect(boardSx0, boardSy0, boardSx1 - boardSx0, boardSy1 - boardSy0);

  // 격자선도 보드(30x30) 안쪽에서만 그림 — 예전엔 경계 밖 어두운 영역에도 격자선이
  // 계속 이어져서 마치 그 바깥에도 칸이 있는 것처럼 보였음
  ctx.strokeStyle = '#e3ddd0'; ctx.lineWidth = 1;
  ctx.beginPath();
  const gx0 = Math.max(x0, BOARD_MIN), gx1 = Math.min(x1, BOARD_MAX + 1);
  const gy0 = Math.max(y0, BOARD_MIN), gy1 = Math.min(y1, BOARD_MAX + 1);
  for (let x = gx0; x <= gx1; x++) { const [sx] = worldToScreen(x, 0); ctx.moveTo(sx, boardSy0); ctx.lineTo(sx, boardSy1); }
  for (let y = gy0; y <= gy1; y++) { const [, sy] = worldToScreen(0, y); ctx.moveTo(boardSx0, sy); ctx.lineTo(boardSx1, sy); }
  ctx.stroke();

  // 선택 칸의 진행 방향(가로/세로) 전체 줄을 내 색으로 은은하게 하이라이트 (입력 가능한 칸일 때만)
  const myHueVal = myHue();
  if (sel && dirAvailable(sel.x, sel.y, sel.dir)) {
    const [selSx, selSy] = worldToScreen(sel.x, sel.y);
    ctx.fillStyle = `hsla(${myHueVal}, 60%, 50%, .08)`;
    if (sel.dir === 'h') ctx.fillRect(0, selSy, innerWidth, cellSize);
    else ctx.fillRect(selSx, 0, cellSize, innerHeight);
  }

  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.font = Math.floor(cellSize * 0.55) + 'px "Apple SD Gothic Neo","Malgun Gothic",sans-serif';
  const now = Date.now();

  for (const [k, c] of cells) {
    const [x, y] = k.split(',').map(Number);
    if (x < x0 - 1 || x > x1 || y < y0 - 1 || y > y1) continue;
    const [sx, sy] = worldToScreen(x, y);
    const age = now - (c.fresh || 0);
    const flashing = age < 2000;
    // 완성 직후 반짝임도 놓은/차지한 사람의 과일 색을 따라가게 해서, 하이라이트/포획/리더보드 색과
    // 헷갈리지 않게 함(예전엔 항상 고정 노란색이라 색 구분 체계와 충돌했음).
    // 글자 칸은 by(마지막 배치자), 포획 칸은 owner(차지한 사람)에 기록되어 있음.
    const flashOwner = c.by != null ? c.by : c.owner;
    const flashHue = flashOwner != null ? ownerHue(flashOwner) : 45;
    const flashFill = `hsla(${flashHue}, 90%, 68%, ${Math.max(0.15, 0.9 - age / 2500)})`;

    if (c.captured) {
      // 땅따먹기로 포획된 영역: 글자 없이 소유자 색으로만 표시
      const hue = ownerHue(c.owner);
      const fill = flashing ? flashFill : `hsla(${hue}, 55%, 55%, .32)`;
      cellBox(sx, sy, fill, `hsl(${hue}, 45%, 45%)`, 1.5);
      continue;
    }

    const blocked = isBlocked(x, y);
    const fill = flashing ? flashFill : (blocked ? '#eae5d8' : '#fffdf7');
    cellBox(sx, sy, fill, blocked ? '#c9c1af' : '#b8ae98', 1.5);
    ctx.fillStyle = blocked ? '#97907f' : '#222';
    ctx.fillText(c.ch, sx + cellSize / 2, sy + cellSize / 2 + 1);
  }

  // 다른 유저들의 실시간 선택 칸 / 입력 중인 글자 (누구나 중간 참여 가능하므로 항상 보이게)
  for (const [id, p] of livePeers) {
    const hue = ownerHue(id);
    const [psx, psy] = worldToScreen(p.x, p.y);
    cellBox(psx, psy, `hsla(${hue}, 65%, 55%, .15)`, `hsl(${hue}, 55%, 45%)`, 1.5);
    if (p.typed) {
      const pdx = p.dir === 'h' ? 1 : 0, pdy = p.dir === 'v' ? 1 : 0;
      for (let i = 0; i < p.typed.length; i++) {
        const cx = p.x + pdx * i, cy = p.y + pdy * i;
        if (cells.has(K(cx, cy))) continue; // 이미 글자 있는 칸은 겹쳐 그리지 않음
        const [sx, sy] = worldToScreen(cx, cy);
        cellBox(sx, sy, `hsla(${hue}, 70%, 55%, .22)`, `hsl(${hue}, 60%, 45%)`, 1.5);
        ctx.fillStyle = `hsl(${hue}, 60%, 38%)`;
        ctx.fillText(p.typed[i], sx + cellSize / 2, sy + cellSize / 2 + 1);
      }
    }
  }

  // 지금 선택한 칸 "그 한 칸"에만 적용 — 원래 있던 글자를 20% 불투명도로 흐리게 깔아둬서,
  // 그 위에 새로 입력하는 글자(아래 activelyTyped 렌더링)가 선명하게 덧그려질 때 잘 구분되게 함.
  // 주변 칸(접두/접미로 이어붙는 기존 글자)은 건드리지 않음.
  if (sel) {
    const selCell = cells.get(K(sel.x, sel.y));
    if (selCell && !selCell.captured && selCell.ch) {
      const [sx, sy] = worldToScreen(sel.x, sel.y);
      ctx.fillStyle = '#fffdf7';
      roundRect(sx + 1.5, sy + 1.5, cellSize - 3, cellSize - 3, 5);
      ctx.fill();
      ctx.fillStyle = 'rgba(34, 34, 34, 0.2)';
      ctx.fillText(selCell.ch, sx + cellSize / 2, sy + cellSize / 2 + 1);
    }
  }

  if (sel && preview) {
    const dx = sel.dir === 'h' ? 1 : 0, dy = sel.dir === 'v' ? 1 : 0;
    // typedFrom~typedFrom+typedLen 구간만 그림 — 그 바깥(접두/접미로 이어붙은 기존 글자)은
    // 건드리지 않고 원래 모습 그대로 둠(사용자가 주변 칸은 흐리게 하지 말라고 요청)
    const typedFrom = preview.typedFrom || 0;
    const typedTo = typedFrom + (preview.typedLen != null ? preview.typedLen : preview.word.length);
    for (let i = 0; i < preview.word.length; i++) {
      if (i < typedFrom || i >= typedTo) continue;
      const cx = preview.startX + dx * i, cy = preview.startY + dy * i;
      const [sx, sy] = worldToScreen(cx, cy);
      cellBox(sx, sy, `hsla(${myHueVal}, 70%, 55%, .25)`, `hsl(${myHueVal}, 65%, 45%)`, 2);
      const ch = preview.word[i];
      if (ch) { ctx.fillStyle = `hsl(${myHueVal}, 65%, 40%)`; ctx.fillText(ch, sx + cellSize / 2, sy + cellSize / 2 + 1); }
    }
    if (preview.conflictTyped >= 0) {
      const cx = sel.x + dx * preview.conflictTyped, cy = sel.y + dy * preview.conflictTyped;
      const [sx, sy] = worldToScreen(cx, cy);
      cellBox(sx, sy, 'rgba(220,80,80,.35)', '#c0392b', 2);
    }
  } else if (sel) {
    const [sx, sy] = worldToScreen(sel.x, sel.y);
    cellBox(sx, sy, `hsla(${myHueVal}, 70%, 55%, .2)`, `hsl(${myHueVal}, 65%, 45%)`, 2);
  }

  // 중복 단어 에러일 때, 이미 보드에 쓰인 그 단어의 실제 위치를 살짝 깜빡이는 주황 테두리로 표시
  if (dupHighlight) {
    const pulse = 0.35 + 0.25 * Math.sin(now / 220);
    for (const loc of dupHighlight) {
      const ldx = loc.dir === 'h' ? 1 : 0, ldy = loc.dir === 'v' ? 1 : 0;
      for (let i = 0; i < loc.word.length; i++) {
        const cx = loc.x + ldx * i, cy = loc.y + ldy * i;
        const [sx, sy] = worldToScreen(cx, cy);
        cellBox(sx, sy, `rgba(243, 156, 18, ${pulse})`, '#c9820a', 2.5);
      }
    }
  }

  positionSelUI(); // 팬/줌 중에도 모드 배지가 선택 칸을 계속 따라다니게 (wordInput은 여기서 안 건드림)
}

setInterval(() => {
  if (dupHighlight) { draw(); return; } // 중복 단어 위치를 계속 깜빡여서 보여줌
  const now = Date.now();
  for (const c of cells.values()) {
    if (c.fresh && now - c.fresh < 2200) { draw(); return; }
  }
}, 120);

// ---------- 뷰 자동 맞춤 ----------
// 현재 보이는(키보드·입력시트 제외) 영역 높이
function visibleHeight() {
  const vv = window.visualViewport;
  // 모바일 키보드가 뜨면 visualViewport.height가 자동으로 줄어들어 반영됨 (별도 시트 없음)
  const vh = vv ? vv.height : innerHeight;
  return Math.max(vh, 120);
}

// 브라우저마다 visualViewport.height가 키보드를 제대로 반영하는 정도가 기기/버전마다 달라서
// (전혀 안 줄어드는 경우도 있음), 키보드 높이를 "추정"하는 방식은 계속 어긋났음. 그래서 아예
// 추정을 포기하고, 실제 가상키보드가 뜰 수 있는 터치 기기에서 칸을 선택하면 항상 "화면 맨
// 위에서 일정 비율(27%) 내려온 위치"에 고정으로 두기로 함 — 키보드가 보통 화면의 아래 절반
// 이상을 차지하므로 이 위치는 거의 모든 기기에서 안전하게 보임.
// 화면 폭만으로는(창을 좁게 줄인 데스크톱 브라우저도 900 이하가 될 수 있음) 키보드가 뜨는
// 기기인지 알 수 없으므로, 터치 지원 여부로 "가상 키보드가 뜰 수 있는 기기"인지 판단함.
// 키보드가 없는 환경(데스크톱, 또는 터치가 없는 좁은 창)은 폭과 상관없이 그대로 화면 정중앙.
const HAS_TOUCH = ('ontouchstart' in window) || (navigator.maxTouchPoints > 0);
function targetSelScreenY() {
  return HAS_TOUCH && innerWidth <= 900 ? innerHeight * 0.27 : visibleHeight() / 2;
}
// 위 기준점을 중심으로 "안전하게 보인다고 가정하는 영역"의 아래쪽 경계 — 칸/미리보기가 이
// 아래로 벗어나면 다시 정렬하거나 칸 크기를 줄이는 기준으로 씀
function assumedVisibleBottom() {
  return HAS_TOUCH && innerWidth <= 900 ? targetSelScreenY() * 2 : visibleHeight();
}

// 보이는 영역의 "맨 위"가 캔버스 기준으로 어디인지. 일부 모바일 브라우저는 입력창 포커스 시
// 레이아웃 뷰포트는 안 스크롤돼도(overflow:hidden) 비주얼 뷰포트만 아래로 슬쩍 밀려서
// (visualViewport.offsetTop > 0) 보이는 영역이 화면 맨 위가 아니게 되는 경우가 있음.
// 이걸 무시하고 0부터 중앙 계산을 하면 실제로는 화면 위쪽에 치우쳐 보이게 됨.
function visibleTop() {
  const vv = window.visualViewport;
  if (!vv) return 0;
  const rect = canvas.getBoundingClientRect();
  return Math.max(0, vv.offsetTop - rect.top);
}

// 보드 전체(30x30 고정 범위)가 화면에 딱 맞게 들어오도록. 예전엔 무한보드라 "지금까지
// 놓인 글자들의 범위"에 맞춰 카메라를 잡았지만, 이제 보드 크기가 고정이라 항상 전체
// 30x30을 한 화면에 보여주는 게 더 직관적임(빈 보드든 아니든 항상 같은 뷰로 시작)
function fitBoard() {
  const vw = innerWidth, vh = visibleHeight();
  const pad = 1; // 경계선 주변 여백
  const bw = (BOARD_MAX - BOARD_MIN + 1) + pad * 2;
  const bh = bw;
  cellSize = Math.min(64, Math.max(10, Math.min(vw / bw, vh / bh)));
  const cx = (BOARD_MIN + BOARD_MAX + 1) / 2, cy = cx;
  camX = cx - vw / (2 * cellSize);
  camY = cy - vh / (2 * cellSize);
  draw();
}

// 선택 칸/미리보기 구간이 가시 영역 밖이면 가운데로 이동
// 칸을 "새로 선택"할 때 항상 그 칸이 화면 정중앙에 오도록 카메라를 옮김. (ensureVisible()은
// "이미 보이면 그대로 두고, 벗어날 때만" 옮기는 방식이라 모바일에서 키보드가 늦게 뜨면서
// 뒤늦게 화면이 확 튀는 느낌을 줬음 — 선택하는 순간 바로/예측 가능하게 중앙 정렬해서 방지)
function centerOnSel() {
  if (!sel) return;
  const vw = innerWidth;
  camX = sel.x + 0.5 - vw / (2 * cellSize);
  camY = sel.y + 0.5 - targetSelScreenY() / cellSize;
}

function ensureVisible() {
  if (!sel) return;
  let minX = sel.x, maxX = sel.x, minY = sel.y, maxY = sel.y;
  if (preview) {
    const dx = sel.dir === 'h' ? 1 : 0, dy = sel.dir === 'v' ? 1 : 0;
    minX = Math.min(minX, preview.startX);
    minY = Math.min(minY, preview.startY);
    maxX = Math.max(maxX, preview.startX + dx * (preview.word.length - 1));
    maxY = Math.max(maxY, preview.startY + dy * (preview.word.length - 1));
  }
  const vw = innerWidth, vh = assumedVisibleBottom();
  const targetY = targetSelScreenY();

  // 스팬이 화면보다 크면 축소
  const spanW = (maxX - minX + 2) * cellSize;
  const spanH = (maxY - minY + 2) * cellSize;
  if (spanW > vw || spanH > vh) {
    cellSize = Math.max(18, Math.min(vw / (maxX - minX + 2), vh / (maxY - minY + 2)));
  }

  // 전부 보이면 그대로, 벗어나면 스팬 중심을 기준점(targetY)으로
  const [sx0, sy0] = worldToScreen(minX, minY);
  const [sx1, sy1] = worldToScreen(maxX + 1, maxY + 1);
  const m = 12;
  if (sx0 >= m && sy0 >= m && sx1 <= vw - m && sy1 <= vh - m) { draw(); return; }
  const cx = (minX + maxX + 1) / 2, cy = (minY + maxY + 1) / 2;
  camX = cx - vw / (2 * cellSize);
  camY = cy - targetY / cellSize;
  draw();
}

if (window.visualViewport) {
  let vvSettleTimer = null;
  visualViewport.addEventListener('resize', () => {
    // 모바일 키보드가 뜨고 닫힐 때 iOS 등 일부 브라우저는 window resize 이벤트를 안 쏴서
    // 캔버스가 다시 초기화(clear)되지 않고, 그 상태에서 줌/이동을 하면 화면에 이전 프레임의
    // 잔상이 남는 경우가 있음. visualViewport가 바뀔 때마다 캔버스를 완전히 리셋해서 방지.
    resize();
    // 키보드가 열리고 닫히는 애니메이션 도중에는 visualViewport.height/offsetTop이 여러 번
    // 중간값으로 계속 바뀌며 resize 이벤트가 연달아 발생함. 그 중간값 그대로 중앙을 계산하면
    // 매번 다른(잘못된) 위치로 잡혀서 "칸마다 세로 중앙이 다르게" 보이는 원인이 됨.
    // 값이 더 이상 안 바뀌고 "안정된" 시점에 딱 한 번만 다시 중앙을 맞춘다.
    clearTimeout(vvSettleTimer);
    vvSettleTimer = setTimeout(() => {
      if (sel) {
        centerOnSel();
        ensureVisible();
        positionSelUI();
        positionWordInput(); // 키보드가 열리거나 닫히며 카메라가 재조정된 뒤에도 보이지 않는
                              // wordInput이 실제 칸 위치와 계속 어긋나지 않게 함
      }
    }, 150);
  });
}

// ---------- 팬 / 줌 ----------
let dragging = false, moved = false, lastX = 0, lastY = 0;

canvas.addEventListener('mousedown', e => {
  dragging = true; moved = false;
  lastX = e.clientX; lastY = e.clientY;
  canvas.classList.add('dragging');
});
addEventListener('mousemove', e => {
  if (!dragging) return;
  const dx = e.clientX - lastX, dy = e.clientY - lastY;
  if (Math.abs(dx) + Math.abs(dy) > 3) moved = true;
  camX -= dx / cellSize; camY -= dy / cellSize;
  lastX = e.clientX; lastY = e.clientY;
  draw();
});
addEventListener('mouseup', e => {
  canvas.classList.remove('dragging');
  if (dragging && !moved && e.target === canvas) {
    const [ex, ey] = toCanvasXY(e.clientX, e.clientY);
    const [cx, cy] = screenToCell(ex, ey);
    openPopup(cx, cy, ex, ey);
  }
  dragging = false;
});
canvas.addEventListener('wheel', e => {
  e.preventDefault();
  const [ex, ey] = toCanvasXY(e.clientX, e.clientY);
  const [wx, wy] = [ex / cellSize + camX, ey / cellSize + camY];
  cellSize = Math.min(90, Math.max(18, cellSize * (e.deltaY < 0 ? 1.1 : 0.9)));
  camX = wx - ex / cellSize;
  camY = wy - ey / cellSize;
  draw();
}, { passive: false });

// ---------- 터치 (모바일): 한 손가락 팬/탭, 두 손가락 핀치 줌 ----------
let touch = null; // { mode, x, y, moved, t0, d, mx, my }
const tDist = (a, b) => Math.hypot(a.clientX - b.clientX, a.clientY - b.clientY);

// 모바일에서는 단순 탭(→ 칸 선택 → 키보드 띄우기)까지 preventDefault()로 막아버리면
// 일부 브라우저(특히 iOS Safari)가 이 터치를 "진짜 사용자 제스처"로 덜 신뢰해서 키보드가
// 안 뜨는 경우가 있음. 그래서 실제로 드래그/핀치가 시작된 뒤에만 preventDefault()를 걸고,
// 제자리 탭은 브라우저의 자연스러운 탭 처리 흐름을 최대한 건드리지 않음.
canvas.addEventListener('touchstart', e => {
  if (e.touches.length === 1) {
    const t = e.touches[0];
    const [ex, ey] = toCanvasXY(t.clientX, t.clientY);
    touch = { mode: 'pan', x: ex, y: ey, sx: ex, sy: ey, moved: false, t0: Date.now() };
  } else if (e.touches.length === 2) {
    e.preventDefault(); // 두 손가락은 핀치줌 의도가 확실하므로 바로 막음
    const [a, b] = e.touches;
    const [amx, amy] = toCanvasXY(a.clientX, a.clientY);
    const [bmx, bmy] = toCanvasXY(b.clientX, b.clientY);
    touch = { mode: 'pinch', d: tDist(a, b), mx: (amx + bmx) / 2, my: (amy + bmy) / 2 };
  }
}, { passive: false });

canvas.addEventListener('touchmove', e => {
  if (!touch) return;
  if (touch.mode === 'pan' && e.touches.length === 1) {
    const t = e.touches[0];
    const [ex, ey] = toCanvasXY(t.clientX, t.clientY);
    const dx = ex - touch.x, dy = ey - touch.y;
    if (Math.abs(ex - touch.sx) + Math.abs(ey - touch.sy) > 8) touch.moved = true;
    if (touch.moved) e.preventDefault(); // 실제로 움직이기 시작한 뒤에만 스크롤 등 기본 동작을 막음
    camX -= dx / cellSize; camY -= dy / cellSize;
    touch.x = ex; touch.y = ey;
    draw();
  } else if (touch.mode === 'pinch' && e.touches.length === 2) {
    e.preventDefault();
    const [a, b] = e.touches;
    const d = tDist(a, b);
    const [amx, amy] = toCanvasXY(a.clientX, a.clientY);
    const [bmx, bmy] = toCanvasXY(b.clientX, b.clientY);
    const mx = (amx + bmx) / 2, my = (amy + bmy) / 2;
    const [wx, wy] = [mx / cellSize + camX, my / cellSize + camY];
    cellSize = Math.min(90, Math.max(18, cellSize * (d / touch.d)));
    camX = wx - mx / cellSize;
    camY = wy - my / cellSize;
    touch.d = d; touch.mx = mx; touch.my = my;
    draw();
  }
}, { passive: false });

canvas.addEventListener('touchend', e => {
  if (touch && touch.mode === 'pan' && !touch.moved && Date.now() - touch.t0 < 600 && e.touches.length === 0) {
    // 제자리 탭 확정 — 이제서야 preventDefault()로 브라우저의 뒤이은 합성 클릭/포커스 처리를
    // 막고, 우리가 openPopup()에서 직접 포커스를 준다(그 시점까지는 진짜 사용자 탭 제스처로
    // 유지되게 해서 iOS 등에서 키보드가 뜰 확률을 높임)
    e.preventDefault();
    const [cx, cy] = screenToCell(touch.sx, touch.sy);
    openPopup(cx, cy, touch.sx, touch.sy);
  } else if (touch && touch.moved) {
    e.preventDefault();
  }
  touch = null;
}, { passive: false });

// ---------- 칸 선택 / 직접 입력 ----------
// wordInput: 화면엔 안 보이지만 실제 <input>이라 한글 IME 조합이 정상 동작함.
// modeBadge: 가로/세로 모드만 표시. 제출은 버튼 없이 키보드 Enter로만 함.
const wordInput = document.getElementById('wordInput');
const modeBadge = document.getElementById('modeBadge');
let submitEnabled = false; // Enter로 제출 가능한 상태인지

// 배지는 팬/줌 중에도 선택 칸을 계속 따라다녀야 하므로 draw()에서 매번 호출됨 (안전 — 포커스 없음)
function positionSelUI() {
  if (!sel) { modeBadge.classList.remove('show'); return; }
  // 이미 차지된(포획된) 영역은 선택만 될 뿐 입력할 수 없으므로, 배지는 띄우지 않음
  if (cells.get(K(sel.x, sel.y))?.captured) { modeBadge.classList.remove('show'); return; }
  const [sx, sy] = worldToScreen(sel.x, sel.y);
  modeBadge.style.left = (sx + cellSize / 2) + 'px';
  modeBadge.style.top = sy + 'px';
  modeBadge.classList.add('show');
}

// wordInput은 칸을 "새로 선택"할 때만 위치를 맞춘다. 타이핑 중(한글 조합 중) 위치/크기가
// 바뀌면 조합이 중간에 끊기는 브라우저가 있어서, draw()가 자주 호출돼도 여긴 건드리지 않음.
function positionWordInput() {
  if (!sel) return;
  const [sx, sy] = worldToScreen(sel.x, sel.y);
  wordInput.style.left = sx + 'px';
  wordInput.style.top = sy + 'px';
  wordInput.style.width = cellSize + 'px';
  wordInput.style.height = cellSize + 'px';
}

// 칸을 선택할 때, 그 칸(또는 빈 칸이면 상하좌우 인접 칸)에 이미 연결된 방향이 있으면
// 그 방향을 우선 채택함. 예전엔 항상 이전 선택의 방향(기본 가로)을 그대로 물려받아서,
// 빈 칸 위/아래에만 기존 글자가 있는 경우(=세로로 이어야 하는 자리)에도 계속 가로로 남아있어
// 그 글자를 못 읽는(=단어로 안 붙는) 버그가 있었음.
function autoDetectDir(cx, cy) {
  const c = cells.get(K(cx, cy));

  // 포획된(차지된) 칸은 벽 취급 — 실제로 이어붙일 수 없으므로 "이을 수 있는 글자"
  // 판단에서 제외해야 함(칸 기록은 있어도 그 방향으로는 못 쓰는 칸이니까)
  const usable = (x, y) => { const k = cells.get(K(x, y)); return !!k && !k.captured; };
  // 글자든 포획 칸이든 "뭔가 이미 차 있어서 그 자리엔 새로 못 넣음"
  const occupied = (x, y) => !!cells.get(K(x, y));
  // 양옆(또는 위아래) 중 최소 한쪽이 비어 있어야 그 방향으로 새 글자를 이어 놓을 자리가 있음
  const hOpen = !occupied(cx - 1, cy) || !occupied(cx + 1, cy);
  const vOpen = !occupied(cx, cy - 1) || !occupied(cx, cy + 1);

  if (c && !c.captured && c.dirs && c.dirs.length === 1) {
    const existing = c.dirs[0], other = existing === 'h' ? 'v' : 'h';
    const existingOpen = existing === 'h' ? hOpen : vOpen;
    const otherOpen = existing === 'h' ? vOpen : hOpen;
    // 예: "카드라마왕"처럼 이미 완성된 가로 단어 한가운데 글자를 클릭하면, 양옆이 전부
    // 다른 글자로 꽉 차 있어 가로로는 더 이상 아무것도 새로 넣을 자리가 없음. 이런 경우
    // 원래 쓰이던 방향(가로) 그대로 두지 말고, 아직 비어 있어 실제로 쓸 수 있는 반대
    // 방향(세로)으로 자동 전환함
    if (!existingOpen && otherOpen) return other;
    return existing;
  }

  const hasH = usable(cx - 1, cy) || usable(cx + 1, cy);
  const hasV = usable(cx, cy - 1) || usable(cx, cy + 1);
  if (hasH && !hasV) return 'h';
  if (hasV && !hasH) return 'v';

  // 인접한 기존 글자가 없는 완전히 새 자리라도, 한쪽 방향은 양옆이 이미 차 있어(포획 등)
  // 2글자 이상의 단어를 놓을 자리 자체가 없을 수 있음 — 가로/세로 둘 중 하나만 실제로
  // 쓸 수 있는 상황이면, 처음부터 그 "쓸 수 있는" 방향으로 자동 선택함
  if (!hOpen && vOpen) return 'v';
  if (!vOpen && hOpen) return 'h';

  return sel?.dir || 'h'; // 둘 다 열려있거나 둘 다 막혀있으면 기존/기본 방향 유지
}

function openPopup(cx, cy, px, py) {
  if (!inBounds(cx, cy)) { showToast('보드 범위(30×30)를 벗어났어요.'); return; }
  const dir = autoDetectDir(cx, cy);
  sel = { x: cx, y: cy, dir };
  preview = null;
  wordInput.value = '';
  // 카메라를 먼저 선택 칸 중심으로 옮긴 다음에 UI(입력창/배지) 위치를 잡아야
  // 화면이 옮겨진 뒤에도 배지/입력창이 실제 칸 위치와 어긋나지 않음
  centerOnSel();
  const capturedHere = cells.get(K(cx, cy))?.captured;
  setMsg(capturedHere ? '포획된 영역이라 사용할 수 없어요. 화살표로 다른 칸으로 이동해 보세요.' : '');
  submitEnabled = false;
  updateModeBadge();
  positionWordInput();
  positionSelUI();
  // 모바일 키보드 자체의 "닫기"(내려가기) 버튼을 눌러 키보드를 숨기면, 일부 브라우저
  // (특히 안드로이드)는 키보드만 사라질 뿐 wordInput은 여전히 document.activeElement로
  // 남아있음. 그 상태에서 같은 칸(혹은 다른 칸)을 다시 탭해도 이미 "포커스돼 있다"고
  // 판단해서 focus()가 아무 효과가 없어 키보드가 다시 뜨지 않고, 결국 입력이 전혀 안 되는
  // 것처럼 보이는 버그였음. blur()로 포커스 상태를 명시적으로 한 번 끊어준 뒤(이미 포커스가
  // 없던 상태였다면 이 호출은 아무 영향 없음) 바로 focus()를 걸어서, 매번 "새로운" 포커스
  // 전환이 확실히 일어나게 함 — iOS에서 키보드가 뜨려면 focus()가 사용자 제스처 처리 도중
  // 동기적으로 호출돼야 하므로 setTimeout/rAF 없이 같은 틱에서 바로 실행한다.
  wordInput.blur();
  wordInput.focus();
  draw();
  broadcastTyping();
}
function closePopup() {
  sel = null; preview = null; placing = false; dupHighlight = null;
  modeBadge.classList.remove('show');
  broadcastTyping();
  draw();
}

// 누구나 중간에 참여할 수 있으므로, 내가 선택한 칸/입력 중인 글자를 다른 유저에게 실시간 브로드캐스트
let broadcastTimer = null;
function broadcastTyping() {
  if (!myPresenceRef) return;
  clearTimeout(broadcastTimer);
  broadcastTimer = setTimeout(() => {
    if (!sel) {
      myPresenceRef.update({ x: null, y: null, dir: null, typed: null, ts: Date.now() });
    } else {
      myPresenceRef.update({ x: sel.x, y: sel.y, dir: sel.dir, typed: wordInput.value, ts: Date.now() });
    }
  }, 150);
}
// 텍스트 상자가 없으므로 메시지는 배지 색깔(초록=성공/빨강=에러)로만 표시하고,
// 실제 문구는 toast로 짧게 띄운다.
function setMsg(text, ok, neutral) {
  modeBadge.classList.toggle('ok', !!ok);
  // neutral: 진짜 에러가 아니라 "아직 입력 중"인 상태(예: 아직 한 글자뿐이라 길이가 모자람)일 때
  // 빨간색(err)으로 보여주면 아무것도 안 했는데 에러가 난 것처럼 보여서 혼란스러움 — 이때는
  // 배지를 기본 색 그대로 두고, 안내 문구는 title(툴팁)로만 남겨둠
  modeBadge.classList.toggle('err', !ok && !neutral && !!text);
  if (text) modeBadge.title = text;
  else modeBadge.removeAttribute('title');
}
function updateModeBadge() {
  if (!sel) return;
  const arrow = sel.dir === 'h' ? '가로' : '세로';
  modeBadge.textContent = '';
  const label = document.createElement('span');
  label.textContent = arrow;
  modeBadge.appendChild(label);
  // 터치 기기가 아니면(=웹) Tab 키로도 전환 가능하다는 걸 배지 안에 작게 보여줌
  if (!HAS_TOUCH) {
    const hint = document.createElement('span');
    hint.className = 'tabHint';
    hint.textContent = 'Tab';
    modeBadge.appendChild(hint);
  }
}

wordInput.addEventListener('input', () => {
  checkPreview();
  broadcastTyping();
  // 일부 브라우저는 한글 IME 조합 중엔 캔버스 리페인트를 미뤄뒀다가 조합이 끝나야 반영하는
  // 경우가 있어서(draw()는 정상 호출되는데 화면엔 안 나타남), rAF로 한 번 더 강제로 그려서
  // 조합 도중에도 미리보기가 즉시 눈에 보이게 함.
  requestAnimationFrame(draw);
});
wordInput.addEventListener('compositionupdate', () => { checkPreview(); requestAnimationFrame(draw); });
wordInput.addEventListener('compositionend', () => { checkPreview(); requestAnimationFrame(draw); });
// 모바일 키보드가 닫히는 시점(포커스 아웃)에도 캔버스를 한 번 완전히 리셋해서 잔상 방지
wordInput.addEventListener('blur', () => requestAnimationFrame(resize));
wordInput.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.isComposing && e.keyCode !== 229) { submit(); return; }
  if (e.key === 'Escape') { closePopup(); return; }
  if (e.key === 'Tab') { e.preventDefault(); toggleDir(); return; }
  if (e.isComposing || e.keyCode === 229) return; // 한글 조합 중엔 방향키를 가로채지 않음
  if (e.key === 'ArrowUp') { e.preventDefault(); moveSel(0, -1); }
  else if (e.key === 'ArrowDown') { e.preventDefault(); moveSel(0, 1); }
  else if (e.key === 'ArrowLeft' && wordInput.selectionStart === 0 && wordInput.selectionEnd === 0) {
    e.preventDefault(); moveSel(-1, 0);
  } else if (e.key === 'ArrowRight' && wordInput.selectionStart === wordInput.value.length && wordInput.selectionEnd === wordInput.value.length) {
    e.preventDefault(); moveSel(1, 0);
  }
});

// 방향키로 선택 칸을 인접 칸으로 이동 (가능한 방향/문구는 openPopup과 동일 로직 재사용)
function moveSel(dx, dy) {
  if (!sel) return;
  const nx = sel.x + dx, ny = sel.y + dy;
  const [sx, sy] = worldToScreen(nx, ny);
  openPopup(nx, ny, sx + cellSize / 2, sy + cellSize / 2);
}

// Tab으로 가로/세로 전환 (가로/세로 제한이 없어져 항상 전환 가능)
function toggleDir() {
  if (!sel) return;
  sel.dir = sel.dir === 'h' ? 'v' : 'h';
  updateModeBadge();
  checkPreview();
  broadcastTyping();
}

// 모바일은 물리 키보드가 없어 Tab을 누를 수 없으므로, 배지를 탭해서도 가로/세로를 바꿀 수 있게 함
modeBadge.addEventListener('click', () => {
  toggleDir();
  wordInput.focus(); // 배지를 탭하는 동안 포커스가 빠졌다면 다시 입력 가능하도록 복구
});

const getLocalCell = (x, y) => {
  if (!inBounds(x, y)) return OUT_OF_BOUNDS_WALL; // 30x30 밖은 항상 벽 취급
  return cells.get(K(x, y)) || null;
};

// 입력 즉시 검증 (사전 포함, 전부 로컬이라 빠름)
function checkPreview() {
  if (!sel) return;
  const typed = wordInput.value.trim();
  const dx = sel.dir === 'h' ? 1 : 0, dy = sel.dir === 'v' ? 1 : 0;
  dupHighlight = null; // 매번 새로 계산 — 중복 단어 상태일 때만 아래에서 다시 채움

  if (!typed) {
    preview = null;
    setMsg('');
    submitEnabled = false;
    draw();
    return;
  }
  // 완성된 음절(가-힣)뿐 아니라 조합 중인 낱자음/모음(ㄱ-ㅎ, ㅏ-ㅣ)도 허용해서,
  // 한 음절이 완성되기 전에도 입력하는 즉시 화면에 보이게 함(자모 단위 실시간 미리보기).
  if (!/^[가-힣ㄱ-ㅎㅏ-ㅣ]+$/.test(typed)) {
    preview = null;
    setMsg('한글만 입력할 수 있어요.');
    submitEnabled = false;
    draw();
    return;
  }
  // 아직 조합 중이라 완성된 음절이 아닌 자모가 하나라도 섞여 있으면, 사전/배치 검증 없이
  // 타이핑한 자모 그대로를 그 자리에 바로 보여주기만 함(완성되면 아래 정식 검증으로 넘어감).
  // typedFrom/typedLen: preview.word 중 "지금 실제로 타이핑 중인 범위"를 표시해서, 이미 글자가
  // 있는 칸에서 시작해도(=접두 없이 바로 그 칸부터 새로 침) 그 범위는 항상 선명하게 덧그려지게 함.
  if (!/^[가-힣]+$/.test(typed)) {
    preview = { startX: sel.x, startY: sel.y, word: typed, conflictTyped: -1, typedFrom: 0, typedLen: typed.length };
    setMsg('');
    submitEnabled = false;
    draw();
    return;
  }

  const r = resolvePlace(typed, sel.x, sel.y, sel.dir, getLocalCell, cells.size === 0, usedWords);
  const typedFrom = r.startX !== undefined ? (dx ? (sel.x - r.startX) : (sel.y - r.startY)) : 0;
  if (r.ok) {
    preview = { startX: r.startX, startY: r.startY, word: r.word, conflictTyped: -1, typedFrom, typedLen: typed.length };
    setMsg(r.canonical !== r.word
      ? `✓ '${r.word}' — 두음법칙 인정! (${r.canonical})`
      : `✓ '${r.word}' — 사전에 있어요!`, true);
    submitEnabled = true;
  } else {
    // 사전에 아직 없거나(타이핑 중) 너무 짧아도, 입력 중인 글자 자체는 항상 화면에 보여준다.
    // (완성된 사전 단어일 때만 미리보기를 그리면 타이핑 도중엔 아무것도 안 보여서 "입력이 안 된다"로 오인됨)
    preview = r.word
      ? { startX: r.startX, startY: r.startY, word: r.word, conflictTyped: r.conflictTyped ?? -1, typedFrom, typedLen: typed.length }
      : { startX: sel.x, startY: sel.y, word: typed, conflictTyped: -1, typedFrom: 0, typedLen: typed.length };
    setMsg(r.err, false, r.tooShort);
    submitEnabled = false;
    // 이미 쓰인 단어라면, 그 단어가 실제로 보드 어디에 있는지 찾아서 하이라이트 대상으로 등록
    if (r.dupWords && r.dupWords.length) {
      dupHighlight = r.dupWords.map(w => placedWordsIndex.get(w)).filter(Boolean);
      if (!dupHighlight.length) dupHighlight = null;
    }
  }
  ensureVisible();
}

// 배치: RTDB 트랜잭션 (DB의 최신 상태 기준으로 재검증 → 원자적 반영)
async function submit() {
  if (!sel || placing) return;
  const typed = wordInput.value.trim();
  if (!typed || !/^[가-힣]+$/.test(typed)) return;
  if (!DICT) { setMsg('사전을 아직 불러오는 중이에요…'); showToast('사전을 아직 불러오는 중이에요…'); return; }
  if (!clientId || !boardRef) { setMsg('플레이어 확인 중이에요…'); showToast('플레이어 확인 중이에요… 잠시 후 다시 시도해 주세요.'); return; }
  placing = true;
  setMsg('놓는 중…');

  const { x, y, dir } = sel;
  let lastErr = null, placedInfo = null;

  try {
    const result = await boardRef.transaction(b => {
      const board = b || { cells: {}, words: [], version: 0 };
      board.cells = board.cells || {};
      board.words = board.words || [];
      // 30x30 밖은 벽으로 취급 — 배치(접두/접미 연결)뿐 아니라 포획(땅따먹기) 판정에서도
      // 마찬가지. 보드 가장자리에 딱 붙어서 나머지 삼면만 글자로 막아도 "완전히 둘러싸인
      // 것"으로 인정되어야 하기 때문(경기장 담벼락도 결국 한쪽 벽 역할을 하는 것과 같음).
      // 다만 이것만으로는 "가운데에 글자 하나만 놓아도 남은 보드 전체가 포획되는" 문제가
      // 생기므로, findCapturedRegions의 MAX_SPAN(영역 폭 제한)을 30x30 보드에 맞게 충분히
      // 작게 낮춰서 "진짜 작게 둘러싸인 영역"만 포획되고 "사실상 안 둘러싸인 넓은 영역"은
      // 계속 걸러지게 함
      const getCell = (cx, cy) => {
        if (!inBounds(cx, cy)) return OUT_OF_BOUNDS_WALL;
        const c = board.cells[K(cx, cy)];
        if (!c) return null;
        if (c.captured) return { ch: null, dirs: [], captured: true, owner: c.owner };
        return { ch: c.ch, dirs: [c.h && 'h', c.v && 'v'].filter(Boolean), captured: false };
      };
      const empty = Object.keys(board.cells).length === 0;
      const wordsList = Array.isArray(board.words) ? board.words : Object.values(board.words);
      const usedWordsTx = new Set(wordsList.map(w => w.canonical || w.word));
      const r = resolvePlace(typed, x, y, dir, getCell, empty, usedWordsTx);
      if (!r.ok) { lastErr = r.err; return; } // abort

      const dx = dir === 'h' ? 1 : 0, dy = dir === 'v' ? 1 : 0;
      const placedCoords = [];
      for (let i = 0; i < r.word.length; i++) {
        const cx = r.startX + dx * i, cy = r.startY + dy * i;
        const k = K(cx, cy);
        const cell = board.cells[k] || { ch: r.word[i] };
        cell[dir] = true;
        cell.by = clientId; // 완성 플래시 색을 놓은 사람 색으로 보여주기 위해 최근 배치자 기록
        board.cells[k] = cell;
        placedCoords.push([cx, cy]);
      }
      board.words.push({
        word: r.word,
        canonical: r.canonical !== r.word ? r.canonical : null,
        x: r.startX, y: r.startY, dir, by: clientId, ts: Date.now(),
      });

      // 땅따먹기: 방금 놓은 글자로 완전히 둘러싸인 빈 칸이 생겼는지 검사해 포획 처리
      const capturedCells = findCapturedRegions(getCell, K, placedCoords);
      for (const [cx, cy] of capturedCells) {
        board.cells[K(cx, cy)] = { captured: true, owner: clientId, ts: Date.now() };
      }

      board.version = (board.version || 0) + 1;
      placedInfo = {
        word: r.word,
        canonical: r.canonical !== r.word ? r.canonical : null,
        capturedCount: capturedCells.length,
        startX: r.startX,
        startY: r.startY,
      };
      return board;
    });

    placing = false;
    if (result.committed && placedInfo) {
      const note = placedInfo.canonical ? ` (두음법칙: ${placedInfo.canonical})` : '';
      const capNote = placedInfo.capturedCount > 0 ? ` — 영역 ${placedInfo.capturedCount}칸 포획!` : '';
      showToast(`'${placedInfo.word}' 완성!${note}${capNote}`);
      // 완성되면 선택 칸을 방금 완성한 단어의 "마지막 글자" 칸으로 옮김 — 이어서 다음 글자를
      // 바로 입력하기 좋은 위치(예: 단어 끝에 새 글자를 붙여 다른 단어를 잇는 흐름)이기 때문
      if (sel) {
        const dxp = dir === 'h' ? 1 : 0, dyp = dir === 'v' ? 1 : 0;
        const lastX = placedInfo.startX + dxp * (placedInfo.word.length - 1);
        const lastY = placedInfo.startY + dyp * (placedInfo.word.length - 1);
        const [sx, sy] = worldToScreen(lastX, lastY);
        openPopup(lastX, lastY, sx + cellSize / 2, sy + cellSize / 2);
      }
    } else if (sel) {
      const errMsg = lastErr || '다른 유저와 겹쳤어요. 다시 시도해 주세요.';
      setMsg(errMsg);
      showToast(errMsg);
    }
  } catch (e) {
    placing = false;
    if (sel) { setMsg('연결에 실패했어요. 다시 시도해 주세요.'); showToast('연결에 실패했어요. 다시 시도해 주세요.'); }
  }
}

// ---------- 토스트 ----------
const toast = document.getElementById('toast');
let toastTimer;
function showToast(msg) {
  toast.textContent = msg;
  toast.style.display = 'block';
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => toast.style.display = 'none', 2500);
}

// ---------- 안내 패널 ----------
const brand = document.getElementById('brand');
const infoPanel = document.getElementById('infoPanel');
brand.onclick = () => infoPanel.classList.toggle('hidden');

// 반복 테스트를 위한 임시 초기화 버튼 — 보드 전체를 비움(단어/포획 영역 모두). 테스트 끝나면
// 버튼(HTML)과 이 핸들러, 위쪽 #resetBoardBtn CSS까지 통째로 지워도 됨.
const resetBoardBtn = document.getElementById('resetBoardBtn');
resetBoardBtn.onclick = () => {
  if (!boardRef) { showToast('아직 연결 중이에요. 잠시 후 다시 시도해 주세요.'); return; }
  // 아무나 누르면 실수로 전체 데이터가 날아갈 수 있어서, 간단한 비밀번호로 한 번 더 막음
  // (보안 목적이 아니라 실수 방지용 — 소스에 그대로 노출되는 값이니 참고)
  const pw = prompt('테스트용 초기화 비밀번호를 입력하세요.');
  if (pw === null) return; // 취소
  if (pw !== '1102') { showToast('비밀번호가 틀렸어요.'); return; }
  if (!confirm('정말 모든 낱말을 초기화할까요?\n테스트용 기능이며 지금 접속 중인 모든 사람에게 영향을 줍니다.')) return;
  boardRef.set({ cells: {}, words: [], version: 0 });
  prevScores.clear(); // 점수판 카운트업 애니메이션용으로 기억해둔 직전 점수도 같이 초기화
                       // (안 지우면 리셋 후 다시 포획해도 "직전 점수"가 예전 값으로 남아있음)
  closePopup();
  showToast('보드를 초기화했어요.');

if (innerWidth > 640) infoPanel.classList.remove('hidden'); // 데스크톱은 기본 표시

// ---------- Firebase 실시간 동기화 ----------
const userCountTagEl = document.getElementById('userCountTag');
let connected = false; // 실시간 연결 상태 — 접속자 태그 색/점으로 함께 표시

function updateStats() {
  userCountTagEl.textContent = (connected ? '● ' : '') + `현재접속자 ${userCount}명`;
}

// ---------- 땅따먹기 리더보드 ----------
const leaderboardEl = document.getElementById('leaderboard');
const lbListEl = document.getElementById('lbList');
let prevScores = new Map(); // owner -> 직전에 화면에 표시했던 점수(점수 오를 때 애니메이션용)
// 점수가 이전 값에서 새 값으로 스르륵 올라가는 것처럼 보이게(카운트업) + 순간적으로
// 커졌다 작아지는 강조 애니메이션(bump)을 같이 줌
function animateScore(el, from, to) {
  if (to <= from) { el.textContent = to + '점'; return; }
  const duration = 600;
  const start = performance.now();
  el.classList.add('bump');
  function step(now) {
    const t = Math.min(1, (now - start) / duration);
    const eased = 1 - Math.pow(1 - t, 3); // ease-out
    const val = Math.round(from + (to - from) * eased);
    el.textContent = val + '점';
    if (t < 1) requestAnimationFrame(step);
    else el.textContent = to + '점';
  }
  requestAnimationFrame(step);
}

function updateLeaderboard() {
  const tally = new Map();
  for (const c of cells.values()) {
    if (c.captured && c.owner) tally.set(c.owner, (tally.get(c.owner) || 0) + 1);
  }
  if (tally.size === 0) { leaderboardEl.classList.add('hidden'); return; }
  // 점수표는 말 그대로 "점수표"이므로 지금 접속 여부와 상관없이 땅을 딴 적 있는 플레이어를
  // 전원(인원 제한 없이) 점수 순으로 보여줌. 대신 과일/색이 8종뿐이라 접속자가 많아지면
  // 서로 다른 사람이 같은 과일로 겹쳐 보일 수 있는데, 그중 지금 실제로 접속 중인 사람은
  // 오른쪽에 작은 점(초록 = 접속 중)으로 표시해서 최소한 "지금 활동 중인지"는 구분되게 함
  const ranked = [...tally.entries()].sort((a, b) => b[1] - a[1]);
  lbListEl.textContent = '';
  // 과일이 8종뿐이라 서로 다른 사람이 같은 과일로 겹칠 수 있음(8명을 넘어가면 반드시 생김).
  // 점수 순으로 훑으면서 같은 과일 이름이 이미 나온 적 있으면 "사과 2", "사과 3"처럼 번호를
  // 붙여서 최소한 화면상 이름은 겹치지 않게 함(색 자체는 여전히 같을 수 있음)
  const nameSeen = new Map();
  // owner(clientId)는 유저가 localStorage를 조작하면 임의 문자열일 수 있으므로
  // innerHTML이 아닌 textContent/DOM API로만 채워 넣어 삽입 공격을 원천 차단
  for (const [owner, count] of ranked) {
    const li = document.createElement('li');
    const hue = ownerHue(owner);
    if (owner === clientId) li.className = 'me';
    const dot = document.createElement('span');
    dot.className = 'dot';
    dot.style.background = `hsl(${hue}, 55%, 55%)`;
    const name = document.createElement('span');
    name.className = 'name';
    const baseName = ownerName(owner);
    const seenCount = (nameSeen.get(baseName) || 0) + 1;
    nameSeen.set(baseName, seenCount);
    const dedupedName = baseName + (seenCount > 1 ? ' ' + seenCount : '');
    name.textContent = dedupedName + (owner === clientId ? ' (나)' : '');
    if (owner === clientId) name.style.color = `hsl(${hue}, 60%, 40%)`;
    const cnt = document.createElement('span');
    cnt.className = 'cnt';
    // 처음 보는 플레이어는 애니메이션 없이 바로 최종 점수로 표시, 이미 알고 있던
    // 플레이어의 점수가 올랐으면 이전 값에서 새 값으로 카운트업 + 반짝임
    const prev = prevScores.has(owner) ? prevScores.get(owner) : count;
    cnt.textContent = prev + '점';
    animateScore(cnt, prev, count);
    prevScores.set(owner, count);
    const live = document.createElement('span');
    const isOnline = onlineIds.has(owner);
    live.className = 'live' + (isOnline ? ' on' : '');
    live.textContent = 'LIVE';
    live.title = isOnline ? '지금 접속 중' : '지금은 접속 안 함';
    li.append(dot, name, cnt, live);
    lbListEl.appendChild(li);
  }
  leaderboardEl.classList.remove('hidden');
}

// ---------- 사전 로드 (플레이어 ID 확정과 무관하게 바로 시작) ----------
fetch('words.txt')
  .then(r => r.text())
  .then(t => {
    DICT = new Set(t.split('\n').filter(Boolean));
    console.log(`사전 로드 완료: ${DICT.size.toLocaleString()}개 명사`);
    if (sel) checkPreview();
  })
  .catch(() => { showToast('사전 로드 실패 — 새로고침 해주세요'); });

// ---------- 부트스트랩: IP 기반 플레이어 ID 확정 후 Firebase 연결 ----------
async function boot() {
  clientId = await fetchClientId();

  firebase.initializeApp(window.FIREBASE_CONFIG);
  const db = firebase.database();
  boardRef = db.ref('board');

  // 연결 상태 + 내 프레즌스(접속 표시 + 실시간 입력 상황 브로드캐스트) — 연결 상태는
  // 별도 태그 없이 접속자 태그의 점(●)/색으로만 표시
  db.ref('.info/connected').on('value', snap => {
    connected = !!snap.val();
    userCountTagEl.classList.toggle('on', connected);
    updateStats();
    if (connected) {
      // 접속자 표시 + 선택 칸/입력 중인 글자 브로드캐스트 (연결이 끊기면 자동 제거)
      myPresenceRef = db.ref('presence/' + clientId);
      myPresenceRef.set({ ts: Date.now() });
      myPresenceRef.onDisconnect().remove();
    }
  });

  db.ref('presence').on('value', snap => {
    const val = snap.val() || {};
    userCount = Math.max(1, Object.keys(val).length);
    onlineIds = new Set(Object.keys(val));
    if (clientId) onlineIds.add(clientId); // 프레즌스 기록이 아직 안 됐어도 나 자신은 항상 포함
    updateStats();
    updateLeaderboard();
    // 다른 유저들의 실시간 선택 칸/입력 상황 갱신 (누구나 중간에 참여해도 바로 보이게)
    livePeers.clear();
    const now = Date.now();
    for (const [id, p] of Object.entries(val)) {
      if (id === clientId || !p || typeof p.x !== 'number') continue;
      if (p.ts && now - p.ts > 15000) continue; // 오래 갱신 안 된 상태(비정상 종료 등)는 무시
      livePeers.set(id, p);
    }
    draw();
  });

  // 보드 실시간 반영
  let firstSync = true;
  boardRef.on('value', snap => {
    const board = snap.val() || { cells: {}, words: [] };
    const bc = board.cells || {};
    const now = Date.now();
    const remote = new Set(Object.keys(bc));
    for (const k of [...cells.keys()]) if (!remote.has(k)) cells.delete(k);
    for (const [k, c] of Object.entries(bc)) {
      const prev = cells.get(k);
      const fresh = prev ? prev.fresh : (firstSync ? 0 : now);
      if (c.captured) {
        cells.set(k, { ch: null, dirs: [], captured: true, owner: c.owner, fresh });
      } else {
        const dirs = [c.h && 'h', c.v && 'v'].filter(Boolean);
        cells.set(k, { ch: c.ch, dirs, captured: false, fresh, by: c.by });
      }
    }
    const words = board.words ? (Array.isArray(board.words) ? board.words : Object.values(board.words)) : [];
    usedWords = new Set(words.map(w => w.canonical || w.word));
    placedWordsIndex = new Map();
    for (const w of words) {
      const canon = w.canonical || w.word;
      placedWordsIndex.set(canon, { x: w.x, y: w.y, dir: w.dir, word: w.word });
    }
    const wasFirst = firstSync;
    firstSync = false;
    updateStats();
    updateLeaderboard();
    if (wasFirst) fitBoard(); // 첫 로드: 단어뭉치를 화면 가운데 적절한 크기로
    else draw();
  });
}
boot();

resize();
</script>
