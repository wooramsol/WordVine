<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>WordVine — 낱말넝쿨</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; font-family: 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif; }
  body { background: #f5f1e8; }
  #board { display: block; cursor: grab; touch-action: none; }
  #board.dragging { cursor: grabbing; }

  #brand {
    position: fixed; top: 12px; left: 12px; z-index: 11;
    background: rgba(255,255,255,.95); border: 1px solid #d8d2c4;
    border-radius: 20px; padding: 8px 14px; box-shadow: 0 2px 8px rgba(0,0,0,.08);
    font-size: 15px; font-weight: 700; color: #1a1a1a; cursor: pointer;
    user-select: none; -webkit-user-select: none; -webkit-tap-highlight-color: transparent;
  }
  #infoPanel {
    position: fixed; top: 54px; left: 12px; z-index: 10;
    background: rgba(255,255,255,.95); border: 1px solid #d8d2c4;
    border-radius: 12px; padding: 12px 15px; box-shadow: 0 2px 10px rgba(0,0,0,.1);
    font-size: 13px; color: #444; line-height: 1.7; max-width: 280px;
  }
  #infoPanel b { color: #1a1a1a; font-size: 15px; }
  #infoPanel.hidden { display: none; }
  #stats { margin-top: 4px; color: #6b5e3f; }
  #credit { margin-top: 8px; font-size: 12px; }
  #credit a { color: #a08c5a; text-decoration: none; }
  #credit a:hover { text-decoration: underline; }
  #status { position: fixed; top: 12px; right: 12px; z-index: 10; font-size: 12px;
    padding: 6px 10px; border-radius: 20px; background: #e5e0d3; color: #777; }
  #status.on { background: #dcefdb; color: #2c6e2f; }

  #popup {
    position: fixed; z-index: 20; display: none;
    background: #fff; border: 1px solid #cfc7b5; border-radius: 12px;
    padding: 12px; box-shadow: 0 6px 24px rgba(0,0,0,.18); width: 250px;
  }
  #popup .dirs { display: flex; gap: 6px; margin-bottom: 8px; }
  #popup .dirs button {
    flex: 1; padding: 6px 0; border: 1px solid #cfc7b5; background: #f7f4ec;
    border-radius: 8px; cursor: pointer; font-size: 13px;
  }
  #popup .dirs button.sel { background: #3b6ea5; color: #fff; border-color: #3b6ea5; }
  #popup .dirs button:disabled {
    opacity: .35; cursor: not-allowed; text-decoration: line-through;
    background: #eee; color: #888; border-color: #ddd;
  }
  #popup .hint { font-size: 11px; color: #9a927d; margin: -3px 0 8px; line-height: 1.4; }
  #wordInput {
    width: 100%; padding: 8px 10px; font-size: 16px; border: 1px solid #cfc7b5;
    border-radius: 8px; outline: none;
  }
  #wordInput:focus { border-color: #3b6ea5; }
  #popup .actions { display: flex; gap: 6px; margin-top: 8px; }
  #popup .actions button {
    flex: 1; padding: 7px 0; border: none; border-radius: 8px; cursor: pointer; font-size: 13px;
  }
  #submitBtn { background: #3b6ea5; color: #fff; }
  #submitBtn:disabled { background: #b8c4d2; cursor: not-allowed; }
  #cancelBtn { background: #eee7d8; color: #555; }
  #popupMsg { font-size: 12px; margin-top: 6px; min-height: 16px; color: #b23b3b; }
  #popupMsg.ok { color: #2c6e2f; }

  #toast {
    position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
    background: rgba(40,40,40,.92); color: #fff; padding: 9px 18px;
    border-radius: 20px; font-size: 13px; z-index: 30; display: none;
    max-width: 90vw; text-align: center;
  }

  /* 모바일: 팝업을 하단 시트로 */
  @media (max-width: 640px) {
    #popup.sheet {
      left: 0 !important; right: 0; top: auto !important; bottom: 0;
      width: 100%; border-radius: 16px 16px 0 0; border-bottom: none;
      padding: 14px 16px calc(14px + env(safe-area-inset-bottom));
      box-shadow: 0 -6px 24px rgba(0,0,0,.18);
    }
    #popup .dirs button { padding: 10px 0; font-size: 15px; }
    #popup .actions button { padding: 12px 0; font-size: 15px; }
    #wordInput { padding: 10px 12px; }
    #toast { bottom: auto; top: 60px; }
  }
</style>
</head>
<body>
<canvas id="board"></canvas>

<div id="brand">WordVine?</div>
<div id="infoPanel" class="hidden">
  <b>WordVine(낱말넝쿨)</b>
  <div>모두가 함께 가꾸는 낱말넝쿨입니다.<br>
  칸을 클릭해서 낱말을 이어주세요.<br>
  <span style="color:#8a7a4f">방향키로 칸 이동, Tab으로 가로/세로 전환</span></div>
  <div id="stats">낱말수 0개, 접속자 1명</div>
  <div id="credit"><a href="https://instagram.com/wooramsol" target="_blank" rel="noopener">Created by @wooramsol</a></div>
</div>
<div id="status">연결 중…</div>

<div id="popup">
  <div class="dirs">
    <button id="dirH">가로 →</button>
    <button id="dirV">세로 ↓</button>
  </div>
  <div class="hint">Tab: 가로/세로 전환 · 방향키: 칸 이동</div>
  <input id="wordInput" placeholder="단어 입력" autocomplete="off">
  <div id="popupMsg"></div>
  <div class="actions">
    <button id="submitBtn">놓기</button>
    <button id="cancelBtn">취소</button>
  </div>
</div>

<div id="toast"></div>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
<script src="firebase-config.js"></script>
<script>
'use strict';
// ---------- 상태 ----------
const cells = new Map();            // "x,y" -> { ch, dirs:[], fresh }
const K = (x, y) => x + ',' + y;
let wordCount = 0, userCount = 1;
let DICT = null;                    // 사전 (Hosting에서 로드)
const clientId = (() => {
  try {
    let id = localStorage.getItem('wv-id');
    if (!id) { id = '유저' + Math.random().toString(36).slice(2, 6); localStorage.setItem('wv-id', id); }
    return id;
  } catch { return '유저' + Math.random().toString(36).slice(2, 6); }
})();

let camX = -6, camY = -5, cellSize = 48;

let sel = null;                     // { x, y, dir }
let preview = null;                 // { startX, startY, word, conflictTyped }
let placing = false;

// ---------- 두음법칙 ----------
const Y_VOWELS = new Set([2, 6, 7, 12, 17, 20]); // ㅑ ㅕ ㅖ ㅛ ㅠ ㅣ
function dueumVariants(ch) {
  const code = ch.charCodeAt(0) - 0xac00;
  if (code < 0 || code > 11171) return [];
  const ini = Math.floor(code / 588);
  const rest = code % 588;
  const vow = Math.floor(rest / 28);
  const make = i => String.fromCharCode(0xac00 + i * 588 + rest);
  if (ini === 5) return [Y_VOWELS.has(vow) ? make(11) : make(2)]; // ㄹ → ㅇ/ㄴ
  if (ini === 2 && Y_VOWELS.has(vow)) return [make(11)];          // ㄴ → ㅇ
  return [];
}

function dictLookup(word, firstExisting) {
  if (DICT.has(word)) return word;
  if (firstExisting) {
    for (const v of dueumVariants(word[0])) {
      const cand = v + word.slice(1);
      if (DICT.has(cand)) return cand;
    }
  }
  return null;
}

// ---------- 배치 판독 (병합/분리 + 두음법칙 + 사전) ----------
// getCell(x,y) -> { ch, dirs:[] } | null 을 받아 어떤 상태에서든 검증 가능
// (미리보기: 로컬 Map, 트랜잭션: DB 스냅샷)
function resolvePlace(typed, x, y, dir, getCell, boardEmpty) {
  const dx = dir === 'h' ? 1 : 0, dy = dir === 'v' ? 1 : 0;

  let prefix = '', sx = x, sy = y;
  while (true) {
    const ex = getCell(sx - dx, sy - dy);
    if (!ex) break;
    prefix = ex.ch + prefix;
    sx -= dx; sy -= dy;
  }
  let suffix = '', ei = typed.length, ex2;
  while ((ex2 = getCell(x + dx * ei, y + dy * ei))) { suffix += ex2.ch; ei++; }

  const tCells = [];
  let overlap = 0, newCount = 0;
  for (let i = 0; i < typed.length; i++) {
    const ex = getCell(x + dx * i, y + dy * i);
    tCells.push(ex);
    if (ex) overlap++; else newCount++;
  }
  if (newCount === 0) return { err: '이미 모두 채워진 자리입니다.' };
  if (!boardEmpty && overlap === 0 && !prefix && !suffix) {
    return { err: '기존 단어와 최소 한 글자는 이어져야 합니다.' };
  }

  const combos = [];
  const push = (uP, uS) => {
    const len = (uP ? prefix.length : 0) + typed.length + (uS ? suffix.length : 0);
    if (!combos.some(c => c.uP === uP && c.uS === uS)) combos.push({ uP, uS, len });
  };
  push(prefix.length > 0, suffix.length > 0);
  push(prefix.length > 0, false);
  push(false, suffix.length > 0);
  push(false, false);
  combos.sort((a, b) => b.len - a.len);

  const fails = [];
  for (const { uP, uS } of combos) {
    let gridTyped = '', conflict = null;
    for (let i = 0; i < typed.length; i++) {
      const ex = tCells[i];
      if (ex) {
        const dueumOk = i === 0 && !uP && dueumVariants(ex.ch).includes(typed[i]);
        if (ex.ch !== typed[i] && !dueumOk) {
          conflict = { kind: 'conflict', i, msg: `${i + 1}번째 칸의 기존 글자('${ex.ch}')와 다릅니다.` };
          break;
        }
        gridTyped += ex.ch;
      } else gridTyped += typed[i];
    }
    if (conflict) { fails.push(conflict); continue; }

    const word = (uP ? prefix : '') + gridTyped + (uS ? suffix : '');
    if (word.length < 2) { fails.push({ kind: 'short' }); continue; }
    if (word.length > 15) { fails.push({ kind: 'long', msg: '완성 단어가 15글자를 넘습니다.' }); continue; }

    const startX = uP ? sx : x;
    const startY = uP ? sy : y;

    let dirErr = null;
    for (let i = 0; i < word.length; i++) {
      const ex = getCell(startX + dx * i, startY + dy * i);
      if (ex && ex.dirs.includes(dir)) {
        const d1 = dir === 'h' ? '가로' : '세로', d2 = dir === 'h' ? '세로' : '가로';
        dirErr = { kind: 'dir', msg: `'${ex.ch}'는 이미 ${d1} 단어의 일부입니다. ${d1}는 ${d2} 단어에서만 이을 수 있어요.` };
        break;
      }
    }
    if (dirErr) { fails.push(dirErr); continue; }

    if (!DICT) return { err: '사전을 아직 불러오는 중이에요…' };
    const firstExisting = !!getCell(startX, startY);
    const canonical = dictLookup(word, firstExisting);
    if (!canonical) { fails.push({ kind: 'dict', word }); continue; }

    return { ok: true, word, canonical, startX, startY };
  }

  const dictWords = [...new Set(fails.filter(f => f.kind === 'dict').map(f => f.word))];
  if (dictWords.length) {
    return { err: dictWords.map(w => `'${w}'`).join(', ') + '(으)로 읽어도 사전에 없는 단어입니다.' };
  }
  const dirF = fails.find(f => f.kind === 'dir');
  if (dirF) return { err: dirF.msg };
  const conf = fails.find(f => f.kind === 'conflict');
  if (conf) return { err: conf.msg, conflictTyped: conf.i, word: prefix + typed + suffix, startX: sx, startY: sy };
  const long = fails.find(f => f.kind === 'long');
  if (long) return { err: long.msg };
  return { err: '두 글자 이상 입력하세요.' };
}

// ---------- 캔버스 ----------
const canvas = document.getElementById('board');
const ctx = canvas.getContext('2d');
const dpr = window.devicePixelRatio || 1;

function resize() {
  canvas.width = innerWidth * dpr;
  canvas.height = innerHeight * dpr;
  canvas.style.width = innerWidth + 'px';
  canvas.style.height = innerHeight + 'px';
  draw();
}
addEventListener('resize', resize);

function worldToScreen(wx, wy) { return [(wx - camX) * cellSize, (wy - camY) * cellSize]; }
function screenToCell(sx, sy) { return [Math.floor(sx / cellSize + camX), Math.floor(sy / cellSize + camY)]; }

function roundRect(x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.arcTo(x + w, y, x + w, y + h, r);
  ctx.arcTo(x + w, y + h, x, y + h, r);
  ctx.arcTo(x, y + h, x, y, r);
  ctx.arcTo(x, y, x + w, y, r);
  ctx.closePath();
}

function cellBox(sx, sy, fill, stroke, lw) {
  ctx.fillStyle = fill;
  roundRect(sx + 1.5, sy + 1.5, cellSize - 3, cellSize - 3, 5);
  ctx.fill();
  ctx.strokeStyle = stroke; ctx.lineWidth = lw;
  roundRect(sx + 1.5, sy + 1.5, cellSize - 3, cellSize - 3, 5);
  ctx.stroke();
}

function isBlocked(x, y) {
  const c = cells.get(K(x, y));
  return !!c && c.dirs.includes('h') && c.dirs.includes('v');
}

function dirAvailable(x, y, dir) {
  const c = cells.get(K(x, y));
  return !(c && c.dirs.includes(dir));
}

function draw() {
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  ctx.clearRect(0, 0, innerWidth, innerHeight);

  const x0 = Math.floor(camX), y0 = Math.floor(camY);
  const x1 = Math.ceil(camX + innerWidth / cellSize), y1 = Math.ceil(camY + innerHeight / cellSize);

  ctx.strokeStyle = '#e3ddd0'; ctx.lineWidth = 1;
  ctx.beginPath();
  for (let x = x0; x <= x1; x++) { const [sx] = worldToScreen(x, 0); ctx.moveTo(sx, 0); ctx.lineTo(sx, innerHeight); }
  for (let y = y0; y <= y1; y++) { const [, sy] = worldToScreen(0, y); ctx.moveTo(0, sy); ctx.lineTo(innerWidth, sy); }
  ctx.stroke();

  // 선택 칸의 진행 방향(가로/세로) 전체 줄을 은은하게 하이라이트 (입력 가능한 칸일 때만)
  if (sel && dirAvailable(sel.x, sel.y, sel.dir)) {
    const [selSx, selSy] = worldToScreen(sel.x, sel.y);
    ctx.fillStyle = 'rgba(59,110,165,.07)';
    if (sel.dir === 'h') ctx.fillRect(0, selSy, innerWidth, cellSize);
    else ctx.fillRect(selSx, 0, cellSize, innerHeight);
  }

  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.font = Math.floor(cellSize * 0.55) + 'px "Apple SD Gothic Neo","Malgun Gothic",sans-serif';
  const now = Date.now();

  for (const [k, c] of cells) {
    const [x, y] = k.split(',').map(Number);
    if (x < x0 - 1 || x > x1 || y < y0 - 1 || y > y1) continue;
    const [sx, sy] = worldToScreen(x, y);
    const age = now - (c.fresh || 0);
    const blocked = isBlocked(x, y);
    const fill = age < 2000
      ? `rgba(255, 224, 130, ${Math.max(0.15, 0.9 - age / 2500)})`
      : (blocked ? '#eae5d8' : '#fffdf7');
    cellBox(sx, sy, fill, blocked ? '#c9c1af' : '#b8ae98', 1.5);
    ctx.fillStyle = blocked ? '#97907f' : '#222';
    ctx.fillText(c.ch, sx + cellSize / 2, sy + cellSize / 2 + 1);
  }

  if (sel && preview) {
    const dx = sel.dir === 'h' ? 1 : 0, dy = sel.dir === 'v' ? 1 : 0;
    for (let i = 0; i < preview.word.length; i++) {
      const cx = preview.startX + dx * i, cy = preview.startY + dy * i;
      const [sx, sy] = worldToScreen(cx, cy);
      const existing = cells.get(K(cx, cy));
      if (existing) {
        cellBox(sx, sy, 'rgba(90,180,110,.18)', '#3e8e52', 2);
      } else {
        cellBox(sx, sy, 'rgba(80,140,220,.25)', '#3b6ea5', 2);
        const ch = preview.word[i];
        if (ch) { ctx.fillStyle = '#3b6ea5'; ctx.fillText(ch, sx + cellSize / 2, sy + cellSize / 2 + 1); }
      }
    }
    if (preview.conflictTyped >= 0) {
      const cx = sel.x + dx * preview.conflictTyped, cy = sel.y + dy * preview.conflictTyped;
      const [sx, sy] = worldToScreen(cx, cy);
      cellBox(sx, sy, 'rgba(220,80,80,.35)', '#c0392b', 2);
    }
  } else if (sel) {
    const [sx, sy] = worldToScreen(sel.x, sel.y);
    cellBox(sx, sy, 'rgba(80,140,220,.2)', '#3b6ea5', 2);
  }
}

setInterval(() => {
  const now = Date.now();
  for (const c of cells.values()) {
    if (c.fresh && now - c.fresh < 2200) { draw(); return; }
  }
}, 120);

// ---------- 뷰 자동 맞춤 ----------
// 현재 보이는(키보드·입력시트 제외) 영역 높이
function visibleHeight() {
  const vv = window.visualViewport;
  let vh = vv ? vv.height : innerHeight;
  if (innerWidth <= 640 && popup.style.display === 'block') vh -= 195; // 하단 시트
  return Math.max(vh, 120);
}

// 보드 전체가 화면 가운데 적절한 크기로 오도록
function fitBoard() {
  const vw = innerWidth, vh = visibleHeight();
  if (cells.size === 0) {
    cellSize = Math.min(56, Math.max(34, Math.floor(vw / 9)));
    camX = 0.5 - vw / (2 * cellSize);
    camY = 0.5 - vh / (2 * cellSize);
    draw();
    return;
  }
  let minX = Infinity, maxX = -Infinity, minY = Infinity, maxY = -Infinity;
  for (const k of cells.keys()) {
    const [x, y] = k.split(',').map(Number);
    if (x < minX) minX = x; if (x > maxX) maxX = x;
    if (y < minY) minY = y; if (y > maxY) maxY = y;
  }
  const pad = 1.5;
  const bw = maxX - minX + 1 + pad * 2;
  const bh = maxY - minY + 1 + pad * 2;
  cellSize = Math.min(64, Math.max(18, Math.min(vw / bw, vh / bh)));
  const cx = (minX + maxX + 1) / 2, cy = (minY + maxY + 1) / 2;
  camX = cx - vw / (2 * cellSize);
  camY = cy - vh / (2 * cellSize);
  draw();
}

// 선택 칸/미리보기 구간이 가시 영역 밖이면 가운데로 이동
function ensureVisible() {
  if (!sel) return;
  let minX = sel.x, maxX = sel.x, minY = sel.y, maxY = sel.y;
  if (preview) {
    const dx = sel.dir === 'h' ? 1 : 0, dy = sel.dir === 'v' ? 1 : 0;
    minX = Math.min(minX, preview.startX);
    minY = Math.min(minY, preview.startY);
    maxX = Math.max(maxX, preview.startX + dx * (preview.word.length - 1));
    maxY = Math.max(maxY, preview.startY + dy * (preview.word.length - 1));
  }
  const vw = innerWidth, vh = visibleHeight();

  // 스팬이 화면보다 크면 축소
  const spanW = (maxX - minX + 2) * cellSize;
  const spanH = (maxY - minY + 2) * cellSize;
  if (spanW > vw || spanH > vh) {
    cellSize = Math.max(18, Math.min(vw / (maxX - minX + 2), vh / (maxY - minY + 2)));
  }

  // 전부 보이면 그대로, 벗어나면 스팬 중심을 가시 영역 중심으로
  const [sx0, sy0] = worldToScreen(minX, minY);
  const [sx1, sy1] = worldToScreen(maxX + 1, maxY + 1);
  const m = 12;
  if (sx0 >= m && sy0 >= m && sx1 <= vw - m && sy1 <= vh - m) { draw(); return; }
  const cx = (minX + maxX + 1) / 2, cy = (minY + maxY + 1) / 2;
  camX = cx - vw / (2 * cellSize);
  camY = cy - vh / (2 * cellSize);
  draw();
}

if (window.visualViewport) {
  visualViewport.addEventListener('resize', () => { if (sel) ensureVisible(); });
}

// ---------- 팬 / 줌 ----------
let dragging = false, moved = false, lastX = 0, lastY = 0;

canvas.addEventListener('mousedown', e => {
  dragging = true; moved = false;
  lastX = e.clientX; lastY = e.clientY;
  canvas.classList.add('dragging');
});
addEventListener('mousemove', e => {
  if (!dragging) return;
  const dx = e.clientX - lastX, dy = e.clientY - lastY;
  if (Math.abs(dx) + Math.abs(dy) > 3) moved = true;
  camX -= dx / cellSize; camY -= dy / cellSize;
  lastX = e.clientX; lastY = e.clientY;
  draw();
});
addEventListener('mouseup', e => {
  canvas.classList.remove('dragging');
  if (dragging && !moved && e.target === canvas) {
    const [cx, cy] = screenToCell(e.clientX, e.clientY);
    openPopup(cx, cy, e.clientX, e.clientY);
  }
  dragging = false;
});
canvas.addEventListener('wheel', e => {
  e.preventDefault();
  const [wx, wy] = [e.clientX / cellSize + camX, e.clientY / cellSize + camY];
  cellSize = Math.min(90, Math.max(18, cellSize * (e.deltaY < 0 ? 1.1 : 0.9)));
  camX = wx - e.clientX / cellSize;
  camY = wy - e.clientY / cellSize;
  draw();
}, { passive: false });

// ---------- 터치 (모바일): 한 손가락 팬/탭, 두 손가락 핀치 줌 ----------
let touch = null; // { mode, x, y, moved, t0, d, mx, my }
const tDist = (a, b) => Math.hypot(a.clientX - b.clientX, a.clientY - b.clientY);

canvas.addEventListener('touchstart', e => {
  e.preventDefault();
  if (e.touches.length === 1) {
    const t = e.touches[0];
    touch = { mode: 'pan', x: t.clientX, y: t.clientY, sx: t.clientX, sy: t.clientY, moved: false, t0: Date.now() };
  } else if (e.touches.length === 2) {
    const [a, b] = e.touches;
    touch = { mode: 'pinch', d: tDist(a, b), mx: (a.clientX + b.clientX) / 2, my: (a.clientY + b.clientY) / 2 };
  }
}, { passive: false });

canvas.addEventListener('touchmove', e => {
  e.preventDefault();
  if (!touch) return;
  if (touch.mode === 'pan' && e.touches.length === 1) {
    const t = e.touches[0];
    const dx = t.clientX - touch.x, dy = t.clientY - touch.y;
    if (Math.abs(t.clientX - touch.sx) + Math.abs(t.clientY - touch.sy) > 8) touch.moved = true;
    camX -= dx / cellSize; camY -= dy / cellSize;
    touch.x = t.clientX; touch.y = t.clientY;
    draw();
  } else if (touch.mode === 'pinch' && e.touches.length === 2) {
    const [a, b] = e.touches;
    const d = tDist(a, b);
    const mx = (a.clientX + b.clientX) / 2, my = (a.clientY + b.clientY) / 2;
    const [wx, wy] = [mx / cellSize + camX, my / cellSize + camY];
    cellSize = Math.min(90, Math.max(18, cellSize * (d / touch.d)));
    camX = wx - mx / cellSize;
    camY = wy - my / cellSize;
    touch.d = d; touch.mx = mx; touch.my = my;
    draw();
  }
}, { passive: false });

canvas.addEventListener('touchend', e => {
  e.preventDefault();
  if (touch && touch.mode === 'pan' && !touch.moved && Date.now() - touch.t0 < 600 && e.touches.length === 0) {
    const [cx, cy] = screenToCell(touch.sx, touch.sy);
    openPopup(cx, cy, touch.sx, touch.sy);
  }
  touch = null;
}, { passive: false });

// ---------- 입력 팝업 ----------
const popup = document.getElementById('popup');
const wordInput = document.getElementById('wordInput');
const popupMsg = document.getElementById('popupMsg');
const dirH = document.getElementById('dirH');
const dirV = document.getElementById('dirV');
const submitBtn = document.getElementById('submitBtn');

function openPopup(cx, cy, px, py) {
  const hOk = dirAvailable(cx, cy, 'h');
  const vOk = dirAvailable(cx, cy, 'v');
  // 가로·세로 모두 막힌 칸도 선택은 허용 (방향키로 지나쳐 다른 칸까지 이동할 수 있어야 함)
  dirH.disabled = !hOk;
  dirV.disabled = !vOk;
  let dir = sel?.dir || 'h';
  if (dir === 'h' && !hOk) dir = 'v';
  if (dir === 'v' && !vOk) dir = 'h';
  sel = { x: cx, y: cy, dir };
  preview = null;
  wordInput.value = '';
  setMsg(!hOk && !vOk ? '이 칸은 가로·세로 모두 사용 중이에요. 화살표로 다른 칸으로 이동해 보세요.' : '');
  submitBtn.disabled = true;
  updateDirBtns();
  popup.style.display = 'block';
  if (innerWidth <= 640) {
    // 모바일: 하단 시트 (키보드에 가리지 않게)
    popup.classList.add('sheet');
    popup.style.left = '';
    popup.style.top = '';
  } else {
    popup.classList.remove('sheet');
    popup.style.left = Math.min(px + 10, innerWidth - 270) + 'px';
    popup.style.top = Math.min(py + 10, innerHeight - 180) + 'px';
  }
  wordInput.focus();
  ensureVisible();
}
function closePopup() {
  sel = null; preview = null; placing = false;
  popup.style.display = 'none';
  draw();
}
function setMsg(text, ok) {
  popupMsg.textContent = text;
  popupMsg.classList.toggle('ok', !!ok);
}
function updateDirBtns() {
  dirH.classList.toggle('sel', sel.dir === 'h');
  dirV.classList.toggle('sel', sel.dir === 'v');
}
dirH.onclick = () => { sel.dir = 'h'; updateDirBtns(); checkPreview(); };
dirV.onclick = () => { sel.dir = 'v'; updateDirBtns(); checkPreview(); };
document.getElementById('cancelBtn').onclick = closePopup;

wordInput.addEventListener('input', checkPreview);
wordInput.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.isComposing && e.keyCode !== 229) { submit(); return; }
  if (e.key === 'Escape') { closePopup(); return; }
  if (e.key === 'Tab') { e.preventDefault(); toggleDir(); return; }
  if (e.isComposing || e.keyCode === 229) return; // 한글 조합 중엔 방향키를 가로채지 않음
  if (e.key === 'ArrowUp') { e.preventDefault(); moveSel(0, -1); }
  else if (e.key === 'ArrowDown') { e.preventDefault(); moveSel(0, 1); }
  else if (e.key === 'ArrowLeft' && wordInput.selectionStart === 0 && wordInput.selectionEnd === 0) {
    e.preventDefault(); moveSel(-1, 0);
  } else if (e.key === 'ArrowRight' && wordInput.selectionStart === wordInput.value.length && wordInput.selectionEnd === wordInput.value.length) {
    e.preventDefault(); moveSel(1, 0);
  }
});

// 방향키로 선택 칸을 인접 칸으로 이동 (가능한 방향/문구는 openPopup과 동일 로직 재사용)
function moveSel(dx, dy) {
  if (!sel) return;
  const nx = sel.x + dx, ny = sel.y + dy;
  const [sx, sy] = worldToScreen(nx, ny);
  openPopup(nx, ny, sx + cellSize / 2, sy + cellSize / 2);
}

// Tab으로 가로/세로 전환 (반대 방향이 이미 막혀 있으면 무시)
function toggleDir() {
  if (!sel) return;
  const nextDir = sel.dir === 'h' ? 'v' : 'h';
  if (nextDir === 'h' && dirH.disabled) return;
  if (nextDir === 'v' && dirV.disabled) return;
  sel.dir = nextDir;
  updateDirBtns();
  checkPreview();
}

const getLocalCell = (x, y) => cells.get(K(x, y)) || null;

// 입력 즉시 검증 (사전 포함, 전부 로컬이라 빠름)
function checkPreview() {
  if (!sel) return;
  const typed = wordInput.value.trim();

  if (!typed) {
    preview = null;
    setMsg('');
    submitBtn.disabled = true;
    draw();
    return;
  }
  if (!/^[가-힣]+$/.test(typed)) {
    preview = null;
    setMsg('한글만 입력할 수 있어요.');
    submitBtn.disabled = true;
    draw();
    return;
  }

  const r = resolvePlace(typed, sel.x, sel.y, sel.dir, getLocalCell, cells.size === 0);
  if (r.ok) {
    preview = { startX: r.startX, startY: r.startY, word: r.word, conflictTyped: -1 };
    setMsg(r.canonical !== r.word
      ? `✓ '${r.word}' — 두음법칙 인정! (${r.canonical})`
      : `✓ '${r.word}' — 사전에 있어요!`, true);
    submitBtn.disabled = false;
  } else {
    preview = r.word ? { startX: r.startX, startY: r.startY, word: r.word, conflictTyped: r.conflictTyped ?? -1 } : null;
    setMsg(r.err);
    submitBtn.disabled = true;
  }
  ensureVisible();
}

// 배치: RTDB 트랜잭션 (DB의 최신 상태 기준으로 재검증 → 원자적 반영)
async function submit() {
  if (!sel || placing) return;
  const typed = wordInput.value.trim();
  if (!typed || !/^[가-힣]+$/.test(typed)) return;
  if (!DICT) { setMsg('사전을 아직 불러오는 중이에요…'); return; }
  placing = true;
  setMsg('놓는 중…');

  const { x, y, dir } = sel;
  let lastErr = null, placedInfo = null;

  try {
    const result = await boardRef.transaction(b => {
      const board = b || { cells: {}, words: [], version: 0 };
      board.cells = board.cells || {};
      board.words = board.words || [];
      const getCell = (cx, cy) => {
        const c = board.cells[K(cx, cy)];
        if (!c) return null;
        return { ch: c.ch, dirs: [c.h && 'h', c.v && 'v'].filter(Boolean) };
      };
      const empty = Object.keys(board.cells).length === 0;
      const r = resolvePlace(typed, x, y, dir, getCell, empty);
      if (!r.ok) { lastErr = r.err; return; } // abort

      const dx = dir === 'h' ? 1 : 0, dy = dir === 'v' ? 1 : 0;
      for (let i = 0; i < r.word.length; i++) {
        const k = K(r.startX + dx * i, r.startY + dy * i);
        const cell = board.cells[k] || { ch: r.word[i] };
        cell[dir] = true;
        board.cells[k] = cell;
      }
      board.words.push({
        word: r.word,
        canonical: r.canonical !== r.word ? r.canonical : null,
        x: r.startX, y: r.startY, dir, by: clientId, ts: Date.now(),
      });
      board.version = (board.version || 0) + 1;
      placedInfo = { word: r.word, canonical: r.canonical !== r.word ? r.canonical : null };
      return board;
    });

    placing = false;
    if (result.committed && placedInfo) {
      const note = placedInfo.canonical ? ` (두음법칙: ${placedInfo.canonical})` : '';
      showToast(`'${placedInfo.word}' 완성!${note}`);
      // 선택 칸 유지: 같은 칸에서 이어 입력하거나 방향키로 다른 칸으로 이동 가능
      if (sel) {
        const [sx, sy] = worldToScreen(x, y);
        openPopup(x, y, sx + cellSize / 2, sy + cellSize / 2);
      }
    } else if (sel) {
      setMsg(lastErr || '다른 유저와 겹쳤어요. 다시 시도해 주세요.');
    }
  } catch (e) {
    placing = false;
    if (sel) setMsg('연결에 실패했어요. 다시 시도해 주세요.');
  }
}
submitBtn.onclick = submit;

// ---------- 토스트 ----------
const toast = document.getElementById('toast');
let toastTimer;
function showToast(msg) {
  toast.textContent = msg;
  toast.style.display = 'block';
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => toast.style.display = 'none', 2500);
}

// ---------- 안내 패널 ----------
const brand = document.getElementById('brand');
const infoPanel = document.getElementById('infoPanel');
brand.onclick = () => infoPanel.classList.toggle('hidden');
if (innerWidth > 640) infoPanel.classList.remove('hidden'); // 데스크톱은 기본 표시

// ---------- Firebase 실시간 동기화 ----------
const statusEl = document.getElementById('status');
const statsEl = document.getElementById('stats');

function updateStats() {
  statsEl.textContent = `낱말수 ${wordCount}개, 접속자 ${userCount}명`;
}

firebase.initializeApp(window.FIREBASE_CONFIG);
const db = firebase.database();
const boardRef = db.ref('board');

// 연결 상태
db.ref('.info/connected').on('value', snap => {
  if (snap.val()) {
    statusEl.textContent = '● 실시간 연결됨';
    statusEl.classList.add('on');
    // 접속자 표시 (연결이 끊기면 자동 제거)
    const myRef = db.ref('presence/' + clientId);
    myRef.set(true);
    myRef.onDisconnect().remove();
  } else {
    statusEl.textContent = '연결 끊김, 재시도 중…';
    statusEl.classList.remove('on');
  }
});

db.ref('presence').on('value', snap => {
  userCount = Math.max(1, snap.numChildren());
  updateStats();
});

// 보드 실시간 반영
let firstSync = true;
boardRef.on('value', snap => {
  const board = snap.val() || { cells: {}, words: [] };
  const bc = board.cells || {};
  const now = Date.now();
  const remote = new Set(Object.keys(bc));
  for (const k of [...cells.keys()]) if (!remote.has(k)) cells.delete(k);
  for (const [k, c] of Object.entries(bc)) {
    const prev = cells.get(k);
    const dirs = [c.h && 'h', c.v && 'v'].filter(Boolean);
    cells.set(k, {
      ch: c.ch, dirs,
      fresh: prev ? (dirs.length !== prev.dirs.length ? prev.fresh : prev.fresh) : (firstSync ? 0 : now),
    });
  }
  const words = board.words ? (Array.isArray(board.words) ? board.words : Object.values(board.words)) : [];
  wordCount = words.length;
  const wasFirst = firstSync;
  firstSync = false;
  updateStats();
  if (wasFirst) fitBoard(); // 첫 로드: 단어뭉치를 화면 가운데 적절한 크기로
  else draw();
});

// ---------- 사전 로드 ----------
statusEl.textContent = '사전 불러오는 중…';
fetch('words.txt')
  .then(r => r.text())
  .then(t => {
    DICT = new Set(t.split('\n').filter(Boolean));
    console.log(`사전 로드 완료: ${DICT.size.toLocaleString()}개 명사`);
    if (sel) checkPreview();
  })
  .catch(() => { statusEl.textContent = '사전 로드 실패 — 새로고침 해주세요'; });

resize();
</script>
</body>
