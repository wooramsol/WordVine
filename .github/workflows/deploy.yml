name: Deploy to Firebase

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install firebase-tools
        run: npm install -g firebase-tools

      - name: Install functions dependencies
        run: npm install --prefix functions

      - name: Write functions/.env (IP 해시용 SALT, 선택)
        env:
          SALT: ${{ secrets.IDENTIFY_SALT }}
        run: |
          if [ -n "$SALT" ]; then
            echo "IDENTIFY_SALT=$SALT" > functions/.env
            echo "IDENTIFY_SALT 시크릿으로 functions/.env 생성 완료"
          else
            echo "IDENTIFY_SALT 시크릿이 없어 기본 SALT로 배포합니다. (repo Settings → Secrets → Actions에 추가 권장)"
          fi

      - name: Write service account
        env:
          SA: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: |
          if [ -z "$SA" ]; then
            echo "::error::FIREBASE_SERVICE_ACCOUNT 시크릿이 없습니다. 레포 Settings → Secrets and variables → Actions에 서비스 계정 JSON을 등록하세요."
            exit 1
          fi
          printf '%s' "$SA" > "$RUNNER_TEMP/sa.json"

      - name: Generate firebase-config.js
        env:
          GOOGLE_APPLICATION_CREDENTIALS: ${{ runner.temp }}/sa.json
          FIREBASE_PROJECT: wordvine-6846a
        run: node scripts/gen-firebase-config.js

      - name: Deploy (hosting + database rules + functions)
        env:
          GOOGLE_APPLICATION_CREDENTIALS: ${{ runner.temp }}/sa.json
        run: firebase deploy --only hosting,database,functions --project wordvine-6846a --non-interactive --force
